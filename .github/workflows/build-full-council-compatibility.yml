name: Build Full Council Certification Compatibility

on:
  pull_request:
    branches: [cpl-quality-noise-governor]
    paths:
      - '.github/workflows/build-full-council-compatibility.yml'

permissions:
  contents: write

jobs:
  construct:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout proof branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Apply compatibility and role-qualification corrections
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected construction marker not found in {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace(
              'main_review/llm_provider.py',
              '''def _text_value(value: object) -> str:\n    if isinstance(value, str) and value.strip():\n        return value\n    if isinstance(value, list):\n        parts = [\n            str(item.get("text", ""))\n            for item in value\n            if isinstance(item, dict) and isinstance(item.get("text"), str) and item.get("text")\n        ]\n        return "\\n".join(parts)\n    return ""\n''',
              '''def _text_value(value: object) -> str:\n    if isinstance(value, str) and value.strip():\n        return value\n    if isinstance(value, dict):\n        for key in ("text", "content", "value", "response", "output"):\n            text = _text_value(value.get(key))\n            if text:\n                return text\n        return ""\n    if isinstance(value, list):\n        parts = [_text_value(item) for item in value]\n        return "\\n".join(part for part in parts if part)\n    return ""\n''',
          )

          replace(
              'main_review/llm_provider.py',
              '''            if isinstance(message, dict):\n                content = _text_value(message.get("content"))\n                if content:\n                    return content\n''',
              '''            if isinstance(message, dict):\n                for key in ("content", "reasoning_content", "reasoning", "analysis"):\n                    content = _text_value(message.get(key))\n                    if content:\n                        return content\n''',
          )

          replace(
              'main_review/llm_provider.py',
              '''    for key in ("response", "output_text", "generated_text", "text"):\n''',
              '''    for key in ("response", "output_text", "generated_text", "text", "reasoning_content", "reasoning", "analysis"):\n''',
          )

          replace(
              'main_review/llm_provider.py',
              '''        for key in ("response", "output_text", "generated_text", "text", "output"):\n''',
              '''        for key in ("response", "output_text", "generated_text", "text", "output", "reasoning_content", "reasoning", "analysis"):\n''',
          )

          old_parse = '''def _parse_json_text(text: str) -> dict[str, Any]:\n    candidate = text.strip()\n    if candidate.startswith("```"):\n        lines = candidate.splitlines()\n        if lines and lines[0].startswith("```"):\n            lines = lines[1:]\n        if lines and lines[-1].strip() == "```":\n            lines = lines[:-1]\n        candidate = "\\n".join(lines).strip()\n    try:\n        payload = json.loads(candidate)\n    except json.JSONDecodeError:\n        start = candidate.find("{")\n        end = candidate.rfind("}")\n        if start < 0 or end <= start:\n            raise LLMProviderError("Cpl model output did not contain a JSON object.") from None\n        try:\n            payload = json.loads(candidate[start : end + 1])\n        except json.JSONDecodeError as error:\n            raise LLMProviderError("Cpl model output contained invalid JSON.") from error\n    if not isinstance(payload, dict):\n        raise LLMProviderError("Cpl model output JSON must be an object.")\n    return payload\n'''
          new_parse = '''def _json_candidate_score(payload: dict[str, Any]) -> tuple[int, int]:\n    keys = {str(key) for key in payload}\n    important = {"verdict", "findings", "coverage", "status", "model", "capabilities"}\n    score = len(keys & important) * 10\n    required = payload.get("required")\n    if isinstance(required, dict):\n        score += len({str(key) for key in required} & important) * 8\n    return score, len(json.dumps(payload, sort_keys=True, default=str))\n\n\ndef _parse_json_text(text: str) -> dict[str, Any]:\n    candidate = text.strip()\n    if candidate.startswith("```"):\n        lines = candidate.splitlines()\n        if lines and lines[0].startswith("```"):\n            lines = lines[1:]\n        if lines and lines[-1].strip() == "```":\n            lines = lines[:-1]\n        candidate = "\\n".join(lines).strip()\n    try:\n        payload = json.loads(candidate)\n    except json.JSONDecodeError:\n        decoder = json.JSONDecoder()\n        objects: list[dict[str, Any]] = []\n        for index, character in enumerate(candidate):\n            if character != "{":\n                continue\n            try:\n                value, _ = decoder.raw_decode(candidate[index:])\n            except json.JSONDecodeError:\n                continue\n            if isinstance(value, dict):\n                objects.append(value)\n        if not objects:\n            raise LLMProviderError("Cpl model output did not contain a parseable JSON object.") from None\n        payload = max(objects, key=_json_candidate_score)\n    if not isinstance(payload, dict):\n        raise LLMProviderError("Cpl model output JSON must be an object.")\n    return payload\n'''
          replace('main_review/llm_provider.py', old_parse, new_parse)

          replace(
              'main_review/cloudflare_models.py',
              '''    "@cf/openai/gpt-oss-20b",\n    "@cf/openai/gpt-oss-120b",\n''',
              '''    "@cf/openai/gpt-oss-20b",\n    "@cf/qwen/qwen2.5-coder-32b-instruct",\n    "@cf/openai/gpt-oss-120b",\n''',
          )

          replace(
              'main_review/cloudflare_cli.py',
              'MISSION_PROOF_MAX_OUTPUT_TOKENS = 1200\nMISSION_PROOF_TIMEOUT_SECONDS = 45.0\n',
              'MISSION_PROOF_MAX_OUTPUT_TOKENS = 1800\nMISSION_PROOF_TIMEOUT_SECONDS = 75.0\n',
          )

          replace(
              'main_review/cloudflare_cli.py',
              '''def test_models(settings: CloudflareGatewaySettings) -> dict[str, Any]:\n''',
              '''def _proof_contract_matches(payload: dict[str, Any], model: str) -> bool:\n    candidates = [payload]\n    for key in ("required", "result"):\n        nested = payload.get(key)\n        if isinstance(nested, dict):\n            candidates.append(nested)\n    return any(\n        candidate.get("status") == "ready"\n        and candidate.get("model") == model\n        and candidate.get("capabilities") == REQUIRED_PROOF_CAPABILITIES\n        for candidate in candidates\n    )\n\n\ndef test_models(settings: CloudflareGatewaySettings) -> dict[str, Any]:\n''',
          )

          replace(
              'main_review/cloudflare_cli.py',
              '''            passed = (\n                payload.get("status") == "ready"\n                and payload.get("model") == model\n                and payload.get("capabilities") == REQUIRED_PROOF_CAPABILITIES\n            )\n''',
              '''            passed = _proof_contract_matches(payload, model)\n''',
          )

          replace(
              'main_review/cloudflare_cli.py',
              '''def qualify_models(\n''',
              '''_SECURITY_COVERAGE_MARKERS = (\n    "security",\n    "injection",\n    "shell",\n    "auth",\n    "authorization",\n    "trust boundary",\n    "vulnerability",\n    "remote code execution",\n    "rce",\n)\n\n\ndef _coverage_area_matches(expected_category: str, reviewed_areas: set[str]) -> bool:\n    expected = expected_category.strip().lower()\n    if not expected:\n        return True\n    if expected in reviewed_areas:\n        return True\n    if expected == "security":\n        return any(\n            marker in area\n            for area in reviewed_areas\n            for marker in _SECURITY_COVERAGE_MARKERS\n        )\n    return False\n\n\ndef qualify_models(\n''',
          )

          replace(
              'main_review/cloudflare_cli.py',
              '''            coverage_matches = (\n                (not expected_path or expected_path in reviewed_files)\n                and (not expected_category or expected_category in reviewed_areas)\n            )\n''',
              '''            coverage_matches = (\n                (not expected_path or expected_path in reviewed_files)\n                and _coverage_area_matches(expected_category, reviewed_areas)\n            )\n''',
          )

          Path('main_review/cloudflare_scout_qualification.py').write_text('''"""Role-appropriate live qualification for low-cost Cloudflare Scout members."""\nfrom __future__ import annotations\n\nimport argparse\nimport json\nimport time\nfrom pathlib import Path\nfrom typing import Any\n\nfrom .cloudflare_cli import cloudflare_route\nfrom .cloudflare_gateway import CloudflareGatewayError, CloudflareGatewaySettings\nfrom .llm_provider import LLMProviderError, invoke_json\n\nSCOUT_MAX_OUTPUT_TOKENS = 700\n\n\ndef _expected_facts(path: Path) -> dict[str, tuple[object, int]]:\n    expected: dict[str, tuple[object, int]] = {}\n    for number, raw_line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):\n        line = raw_line.strip()\n        if not line or line.startswith("#") or "=" not in line:\n            continue\n        name, raw_value = (part.strip() for part in line.split("=", 1))\n        try:\n            value = json.loads(raw_value.replace("'", '"'))\n        except json.JSONDecodeError:\n            continue\n        expected[name] = (value, number)\n    return expected\n\n\ndef qualify_scouts(\n    settings: CloudflareGatewaySettings,\n    *,\n    root: str | Path,\n    file: str,\n) -> dict[str, Any]:\n    settings.validate()\n    root_path = Path(root)\n    source = root_path / file\n    if not source.is_file():\n        raise CloudflareGatewayError(f"Scout qualification file is not readable: {file}")\n    expected = _expected_facts(source)\n    if not expected:\n        raise CloudflareGatewayError("Scout qualification requires extractable constants.")\n    source_text = source.read_text(encoding="utf-8")\n    results: list[dict[str, Any]] = []\n    for model in settings.models:\n        route = cloudflare_route(\n            settings,\n            model=model,\n            max_output_tokens=SCOUT_MAX_OUTPUT_TOKENS,\n            timeout_seconds=settings.timeout_seconds,\n        )\n        system_prompt = (\n            "Return JSON only. You are a Scout evidence-extraction council member. "\n            "Extract grounded facts without classifying defects or inventing values."\n        )\n        user_prompt = json.dumps({\n            "model": model,\n            "path": file,\n            "source": source_text,\n            "instruction": (\n                "Return status=ready, the exact model, coverage.files_reviewed, "\n                "coverage.areas containing evidence extraction, and facts with name, value, and 1-based line."\n            ),\n        })\n        started = time.monotonic()\n        try:\n            payload = invoke_json(route, system_prompt=system_prompt, user_prompt=user_prompt)\n            coverage = payload.get("coverage", {}) if isinstance(payload.get("coverage"), dict) else {}\n            reviewed = coverage.get("files_reviewed", [])\n            areas = coverage.get("areas", [])\n            facts = payload.get("facts", []) if isinstance(payload.get("facts"), list) else []\n            observed = {\n                str(item.get("name")): (item.get("value"), item.get("line"))\n                for item in facts\n                if isinstance(item, dict) and item.get("name")\n            }\n            passed = bool(\n                payload.get("status") == "ready"\n                and payload.get("model") == model\n                and isinstance(reviewed, list)\n                and file in {str(item) for item in reviewed}\n                and isinstance(areas, list)\n                and any("evidence" in str(item).lower() or "extraction" in str(item).lower() for item in areas)\n                and observed == expected\n            )\n            results.append({\n                "model": model,\n                "passed": passed,\n                "duration_ms": round((time.monotonic() - started) * 1000, 2),\n                "expected_facts": expected,\n                "response": {\n                    "status": payload.get("status"),\n                    "coverage": coverage,\n                    "facts": facts,\n                },\n            })\n        except LLMProviderError as error:\n            results.append({\n                "model": model,\n                "passed": False,\n                "duration_ms": round((time.monotonic() - started) * 1000, 2),\n                "error": str(error),\n            })\n    qualified = [str(item["model"]) for item in results if item.get("passed") is True]\n    return {\n        "provider": "cloudflare-workers-ai",\n        "proof_type": "scout_evidence_extraction",\n        "model_count": len(settings.models),\n        "passed_count": len(qualified),\n        "qualified_models": qualified,\n        "all_passed": bool(results) and len(qualified) == len(results),\n        "models": results,\n    }\n\n\ndef main(argv: list[str] | None = None) -> int:\n    parser = argparse.ArgumentParser(prog="python -m main_review.cloudflare_scout_qualification")\n    parser.add_argument("path", nargs="?", default=".")\n    parser.add_argument("--file", required=True)\n    parser.add_argument("--pretty", action="store_true")\n    parser.add_argument("--require", action="store_true")\n    args = parser.parse_args(argv)\n    settings = CloudflareGatewaySettings.from_environment()\n    try:\n        payload = qualify_scouts(settings, root=args.path, file=args.file)\n    except CloudflareGatewayError as error:\n        payload = {\n            "provider": "cloudflare-workers-ai",\n            "proof_type": "scout_evidence_extraction",\n            "passed_count": 0,\n            "all_passed": False,\n            "error": str(error),\n        }\n    print(json.dumps(payload, indent=2 if args.pretty else None, sort_keys=True))\n    return 0 if payload.get("all_passed") or not args.require else 2\n\n\nif __name__ == "__main__":\n    raise SystemExit(main())\n''', encoding='utf-8')

          Path('tests/test_cloudflare_full_roster_qualification.py').write_text('''from __future__ import annotations\n\nfrom pathlib import Path\n\nimport pytest\n\nfrom main_review import cloudflare_cli, cloudflare_scout_qualification, llm_provider\nfrom main_review.cloudflare_gateway import CloudflareGatewaySettings\n\n\ndef _settings(models=("@cf/test/model",)) -> CloudflareGatewaySettings:\n    return CloudflareGatewaySettings(\n        account_id="0123456789abcdef0123456789abcdef",\n        api_token="secret-token",\n        models=models,\n        host="127.0.0.1",\n        port=0,\n        timeout_seconds=90.0,\n        max_request_bytes=100_000,\n    )\n\n\ndef test_structured_proof_accepts_exact_contract_nested_under_required(monkeypatch: pytest.MonkeyPatch) -> None:\n    model = "@cf/test/model"\n    monkeypatch.setattr(\n        cloudflare_cli,\n        "invoke_json",\n        lambda *args, **kwargs: {\n            "required": {\n                "status": "ready",\n                "model": model,\n                "capabilities": cloudflare_cli.REQUIRED_PROOF_CAPABILITIES,\n            }\n        },\n    )\n    result = cloudflare_cli.test_models(_settings())\n    assert result["all_passed"] is True\n\n\ndef test_security_coverage_accepts_specific_security_areas() -> None:\n    assert cloudflare_cli._coverage_area_matches(\n        "security",\n        {"command injection", "shell execution", "trust boundary", "authentication/authorization"},\n    ) is True\n\n\ndef test_json_parser_selects_review_object_from_reasoning_text() -> None:\n    text = 'thinking {"example": true} final {"verdict":"BLOCK","findings":[],"coverage":{}}'\n    assert llm_provider._parse_json_text(text)["verdict"] == "BLOCK"\n    payload = {"choices": [{"message": {"content": "", "reasoning_content": '{"status":"ready"}'}}]}\n    assert llm_provider._extract_text(payload, "chat_completions") == '{"status":"ready"}'\n\n\ndef test_scout_qualification_requires_exact_grounded_facts(monkeypatch: pytest.MonkeyPatch, tmp_path: Path) -> None:\n    root = tmp_path / "repo"\n    source = root / "src" / "scout.py"\n    source.parent.mkdir(parents=True)\n    source.write_text(\n        'RETRY_LIMIT = 3\\nTIMEOUT_SECONDS = 15\\nSUPPORTED_LANGUAGES = ["python", "javascript"]\\n',\n        encoding="utf-8",\n    )\n    model = "@cf/test/model"\n    monkeypatch.setattr(\n        cloudflare_scout_qualification,\n        "invoke_json",\n        lambda *args, **kwargs: {\n            "status": "ready",\n            "model": model,\n            "coverage": {"files_reviewed": ["src/scout.py"], "areas": ["evidence extraction"]},\n            "facts": [\n                {"name": "RETRY_LIMIT", "value": 3, "line": 1},\n                {"name": "TIMEOUT_SECONDS", "value": 15, "line": 2},\n                {"name": "SUPPORTED_LANGUAGES", "value": ["python", "javascript"], "line": 3},\n            ],\n        },\n    )\n    result = cloudflare_scout_qualification.qualify_scouts(\n        _settings(), root=root, file="src/scout.py"\n    )\n    assert result["all_passed"] is True\n''', encoding='utf-8')

          Path('.github/workflows/cloudflare-full-council-certification.yml').write_text('''name: Full Cloudflare Council Member Certification\n\non:\n  pull_request:\n    branches: [cpl-quality-noise-governor]\n    paths:\n      - '.github/workflows/cloudflare-full-council-certification.yml'\n      - 'main_review/cloudflare_cli.py'\n      - 'main_review/cloudflare_models.py'\n      - 'main_review/cloudflare_scout_qualification.py'\n      - 'main_review/llm_provider.py'\n      - 'tests/test_cloudflare_full_roster_qualification.py'\n\npermissions:\n  contents: read\n\nconcurrency:\n  group: cloudflare-full-council-certification-${{ github.ref }}\n  cancel-in-progress: false\n\njobs:\n  certify-all-members:\n    runs-on: ubuntu-latest\n    timeout-minutes: 55\n    env:\n      SERGEANT_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SERGEANT_CLOUDFLARE_ACCOUNT_ID }}\n      SERGEANT_CLOUDFLARE_API_TOKEN: ${{ secrets.SERGEANT_CLOUDFLARE_API_TOKEN }}\n      SERGEANT_CLOUDFLARE_MODELS: '@cf/zai-org/glm-4.7-flash,@cf/qwen/qwen2.5-coder-32b-instruct,@cf/ibm-granite/granite-4.0-h-micro,@cf/openai/gpt-oss-120b,@cf/moonshotai/kimi-k2.7-code,@cf/qwen/qwen3-30b-a3b-fp8,@cf/openai/gpt-oss-20b'\n      SERGEANT_CPL_ENABLED: 'true'\n      SERGEANT_CPL_POLICY: required\n      SERGEANT_CPL_DEPTH: maximum\n      SERGEANT_CPL_MAX_PASSES: '7'\n      SERGEANT_CPL_MAX_COUNCIL_MEMBERS: '7'\n      SERGEANT_CPL_MAX_ROUNDS: '3'\n      SERGEANT_CPL_MAX_INPUT_CHARS: '16000'\n      SERGEANT_CLOUDFLARE_TIMEOUT_SECONDS: '90'\n    steps:\n      - name: Checkout exact candidate head\n        uses: actions/checkout@v4\n        with:\n          ref: ${{ github.event.pull_request.head.sha }}\n          persist-credentials: false\n\n      - name: Set up Python\n        uses: actions/setup-python@v5\n        with:\n          python-version: '3.12'\n\n      - name: Install Sergeant\n        run: |\n          python -m pip install --upgrade pip\n          python -m pip install -e .\n\n      - name: Run focused compatibility tests\n        run: python -m pytest -q tests/test_cloudflare_full_roster_qualification.py tests/test_cloudflare_mission_qualification.py\n\n      - name: Record candidate head\n        run: |\n          mkdir -p build\n          git rev-parse HEAD | tee build/full-council-tested-sha.txt\n\n      - name: Create role-specific mission fixtures\n        run: |\n          mkdir -p build/full-council-fixture/src\n          cat > build/full-council-fixture/src/auth.py <<'PY'\n          import subprocess\n\n          def run_user_command(request):\n              command = request.args.get("command")\n              return subprocess.run(command, shell=True)\n          PY\n          cat > build/full-council-fixture/src/scout.py <<'PY'\n          RETRY_LIMIT = 3\n          TIMEOUT_SECONDS = 15\n          SUPPORTED_LANGUAGES = ["python", "javascript"]\n          PY\n\n      - name: Capture credential-safe route status\n        run: sergeant-cloudflare --pretty status --require > build/full-council-status.json\n\n      - name: Prove structured transport for all seven members\n        id: handshake\n        shell: bash\n        run: |\n          set +e\n          sergeant-cloudflare --pretty test-models --require > build/full-council-handshake.json\n          code=$?\n          set -e\n          echo "exit_code=$code" >> "$GITHUB_OUTPUT"\n\n      - name: Prove officer missions for six reasoning members\n        id: officer\n        env:\n          SERGEANT_CLOUDFLARE_MODELS: '@cf/zai-org/glm-4.7-flash,@cf/qwen/qwen2.5-coder-32b-instruct,@cf/openai/gpt-oss-120b,@cf/moonshotai/kimi-k2.7-code,@cf/qwen/qwen3-30b-a3b-fp8,@cf/openai/gpt-oss-20b'\n        shell: bash\n        run: |\n          set +e\n          sergeant-cloudflare --pretty qualify-models build/full-council-fixture \\\n            --files src/auth.py \\\n            --expected-verdict BLOCK \\\n            --expected-path src/auth.py \\\n            --expected-category security \\\n            --expected-severity blocker \\\n            --expected-evidence shell=True \\\n            --minimum-models 6 \\\n            --require > build/full-council-officer-mission.json\n          code=$?\n          set -e\n          echo "exit_code=$code" >> "$GITHUB_OUTPUT"\n\n      - name: Prove Granite Scout evidence extraction mission\n        id: scout\n        env:\n          SERGEANT_CLOUDFLARE_MODELS: '@cf/ibm-granite/granite-4.0-h-micro'\n        shell: bash\n        run: |\n          set +e\n          python -m main_review.cloudflare_scout_qualification build/full-council-fixture \\\n            --file src/scout.py --pretty --require > build/full-council-scout-mission.json\n          code=$?\n          set -e\n          echo "exit_code=$code" >> "$GITHUB_OUTPUT"\n\n      - name: Build member-by-member certification summary\n        if: always()\n        shell: bash\n        run: |\n          python - <<'PY'\n          import json\n          from pathlib import Path\n\n          expected = [\n              '@cf/zai-org/glm-4.7-flash',\n              '@cf/qwen/qwen2.5-coder-32b-instruct',\n              '@cf/ibm-granite/granite-4.0-h-micro',\n              '@cf/openai/gpt-oss-120b',\n              '@cf/moonshotai/kimi-k2.7-code',\n              '@cf/qwen/qwen3-30b-a3b-fp8',\n              '@cf/openai/gpt-oss-20b',\n          ]\n          def load(path):\n              file = Path(path)\n              try:\n                  return json.loads(file.read_text(encoding='utf-8'))\n              except Exception:\n                  return {}\n          status = load('build/full-council-status.json')\n          handshake = load('build/full-council-handshake.json')\n          officer = load('build/full-council-officer-mission.json')\n          scout = load('build/full-council-scout-mission.json')\n          handshake_rows = {str(row.get('model')): row for row in handshake.get('models', []) if isinstance(row, dict) and row.get('model')}\n          mission_rows = {str(row.get('model')): row for row in officer.get('models', []) if isinstance(row, dict) and row.get('model')}\n          mission_rows.update({str(row.get('model')): row for row in scout.get('models', []) if isinstance(row, dict) and row.get('model')})\n          members = []\n          for model in expected:\n              transport = handshake_rows.get(model, {})\n              mission = mission_rows.get(model, {})\n              members.append({\n                  'model': model,\n                  'structured_transport_passed': transport.get('passed') is True,\n                  'role_mission_passed': mission.get('passed') is True,\n                  'transport_error': transport.get('error'),\n                  'mission_error': mission.get('error'),\n                  'mission_response': mission.get('response'),\n              })\n          certified = [item['model'] for item in members if item['structured_transport_passed'] and item['role_mission_passed']]\n          payload = {\n              'schema_version': 'sergeant.cloudflare-full-council-certification.v2',\n              'tested_sha': Path('build/full-council-tested-sha.txt').read_text(encoding='utf-8').strip(),\n              'expected_member_count': len(expected),\n              'structured_pass_count': handshake.get('passed_count', 0),\n              'officer_mission_pass_count': officer.get('passed_count', 0),\n              'scout_mission_pass_count': scout.get('passed_count', 0),\n              'certified_member_count': len(certified),\n              'certified_models': certified,\n              'uncertified_models': [model for model in expected if model not in certified],\n              'route_valid': status.get('valid') is True,\n              'members': members,\n              'handshake_exit': int('${{ steps.handshake.outputs.exit_code }}' or '1'),\n              'officer_exit': int('${{ steps.officer.outputs.exit_code }}' or '1'),\n              'scout_exit': int('${{ steps.scout.outputs.exit_code }}' or '1'),\n          }\n          payload['passed'] = bool(\n              payload['route_valid']\n              and payload['structured_pass_count'] == 7\n              and payload['officer_mission_pass_count'] == 6\n              and payload['scout_mission_pass_count'] == 1\n              and payload['certified_member_count'] == 7\n          )\n          Path('build/full-council-certification-summary.json').write_text(\n              json.dumps(payload, indent=2, sort_keys=True) + '\\n', encoding='utf-8'\n          )\n          print(json.dumps(payload, indent=2, sort_keys=True))\n          PY\n\n      - name: Verify credentials are absent from artifacts\n        id: credential_scan\n        if: always()\n        run: |\n          python - <<'PY'\n          import os\n          from pathlib import Path\n          values = [os.getenv('SERGEANT_CLOUDFLARE_ACCOUNT_ID', ''), os.getenv('SERGEANT_CLOUDFLARE_API_TOKEN', '')]\n          artifacts = list(Path('build').glob('full-council-*.json'))\n          assert artifacts\n          for path in artifacts:\n              text = path.read_text(encoding='utf-8', errors='replace')\n              for value in values:\n                  if value:\n                      assert value not in text, f'Credential or account identifier leaked into {path}'\n          PY\n\n      - name: Upload full council certification evidence\n        if: always() && steps.credential_scan.outcome == 'success'\n        uses: actions/upload-artifact@v4\n        with:\n          name: cloudflare-full-council-certification\n          path: |\n            build/full-council-tested-sha.txt\n            build/full-council-status.json\n            build/full-council-handshake.json\n            build/full-council-officer-mission.json\n            build/full-council-scout-mission.json\n            build/full-council-certification-summary.json\n          if-no-files-found: error\n          retention-days: 14\n\n      - name: Enforce all-member certification\n        if: always()\n        run: |\n          python - <<'PY'\n          import json\n          from pathlib import Path\n          payload = json.loads(Path('build/full-council-certification-summary.json').read_text(encoding='utf-8'))\n          assert payload.get('passed') is True, 'Not all seven Cloudflare council members certified.'\n          PY\n''', encoding='utf-8')
          PY

      - name: Run focused tests before commit
        run: python -m pytest -q tests/test_cloudflare_full_roster_qualification.py tests/test_cloudflare_mission_qualification.py tests/test_llm_provider.py

      - name: Commit constructed correction and remove constructor
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/build-full-council-compatibility.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/cloudflare-full-council-certification.yml \
            main_review/cloudflare_cli.py \
            main_review/cloudflare_models.py \
            main_review/cloudflare_scout_qualification.py \
            main_review/llm_provider.py \
            tests/test_cloudflare_full_roster_qualification.py
          git commit -m 'Qualify the complete Cloudflare council by role'
          git push origin HEAD:${{ github.head_ref }}
