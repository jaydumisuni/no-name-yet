name: Temporary PR 102 Runner Context Fix

on:
  push:
    branches: [cpl-quality-noise-governor]
    paths:
      - .github/workflows/temporary-pr102-runner-context-fix.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/temporary-pr102-runner-context-fix.yml

permissions:
  contents: write

jobs:
  repair:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.ref == 'cpl-quality-noise-governor' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cpl-quality-noise-governor
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Repair runner-context placement
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          files = (
              Path('.github/workflows/blind-static-training.yml'),
              Path('.github/workflows/review-intelligence-proof.yml'),
          )
          forbidden = '      SERGEANT_CLOUDFLARE_USAGE_STATE: ${{ runner.temp }}/sergeant-training-usage.json\n'
          install_marker = '      - name: Install frozen Sergeant package\n'
          runtime_step = (
              '      - name: Configure isolated Cloudflare usage state\n'
              '        shell: bash\n'
              '        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-training-usage.json" >> "$GITHUB_ENV"\n\n'
          )

          for path in files:
              text = path.read_text(encoding='utf-8')
              if forbidden in text:
                  text = text.replace(forbidden, '', 1)
              if 'Configure isolated Cloudflare usage state' not in text:
                  if install_marker not in text:
                      raise SystemExit(f'{path}: install marker is missing')
                  text = text.replace(install_marker, runtime_step + install_marker, 1)
              if forbidden in text:
                  raise SystemExit(f'{path}: forbidden job-level runner context remains')
              path.write_text(text, encoding='utf-8')

          Path('tests/test_workflow_context_contracts.py').write_text('''from __future__ import annotations

from pathlib import Path


WORKFLOWS = (
    Path(".github/workflows/blind-static-training.yml"),
    Path(".github/workflows/review-intelligence-proof.yml"),
)


def test_runner_only_context_is_not_used_in_job_level_environment() -> None:
    for path in WORKFLOWS:
        text = path.read_text(encoding="utf-8")
        assert "SERGEANT_CLOUDFLARE_USAGE_STATE: ${{ runner.temp }}" not in text
        assert (
            'run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-training-usage.json" '
            '>> "$GITHUB_ENV"'
        ) in text


def test_usage_state_is_exported_before_static_training_executes() -> None:
    for path in WORKFLOWS:
        text = path.read_text(encoding="utf-8")
        export_at = text.index("Configure isolated Cloudflare usage state")
        training_at = text.index("Run Sergeant first without models or workspace")
        assert export_at < training_at
''', encoding='utf-8')
          PY
      - name: Run focused regression
        run: |
          python -m pip install pytest
          python -m pytest -q tests/test_workflow_context_contracts.py tests/test_cloudflare_usage_governor.py
      - name: Validate workflows with actionlint
        shell: bash
        run: |
          set -euo pipefail
          version=1.7.7
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_x86_64.tar.gz" -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint .github/workflows/blind-static-training.yml .github/workflows/review-intelligence-proof.yml
      - name: Commit production correction and remove constructor
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "THETECHGUY Engineering"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/temporary-pr102-runner-context-fix.yml
          git add .github/workflows/blind-static-training.yml .github/workflows/review-intelligence-proof.yml tests/test_workflow_context_contracts.py
          git commit -m "Fix runner context use in static proof workflows"
          git push origin HEAD:cpl-quality-noise-governor
