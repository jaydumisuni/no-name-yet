name: Cloudflare Inference Status Probe

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/cloudflare-inference-status-probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe one bounded inference request
        env:
          ACCOUNT_ID: ${{ secrets.SERGEANT_CLOUDFLARE_ACCOUNT_ID }}
          API_TOKEN: ${{ secrets.SERGEANT_CLOUDFLARE_API_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          account_id = os.getenv('ACCOUNT_ID', '').strip()
          token = os.getenv('API_TOKEN', '').strip()
          assert account_id and token, 'Cloudflare credentials are missing.'
          url = f'https://api.cloudflare.com/client/v4/accounts/{account_id}/ai/v1/chat/completions'
          body = {
              'model': '@cf/openai/gpt-oss-20b',
              'messages': [{'role': 'user', 'content': 'Return JSON: {"ok": true}'}],
              'temperature': 0,
              'max_tokens': 16,
          }
          request = urllib.request.Request(
              url,
              data=json.dumps(body).encode('utf-8'),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json',
                  'Accept': 'application/json',
                  'User-Agent': 'sergeant-inference-status-probe',
              },
              method='POST',
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  status = response.status
                  payload = json.load(response)
              choices = payload.get('choices', []) if isinstance(payload, dict) else []
              has_output = bool(choices)
              print(json.dumps({'http_status': status, 'has_output': has_output}, sort_keys=True))
              assert status == 200 and has_output
          except urllib.error.HTTPError as error:
              safe = {'http_status': error.code, 'has_output': False}
              try:
                  payload = json.loads(error.read().decode('utf-8', errors='replace'))
              except Exception:
                  payload = {}
              errors = payload.get('errors', []) if isinstance(payload, dict) else []
              if isinstance(errors, list):
                  safe['provider_error_codes'] = sorted({
                      str(item.get('code'))
                      for item in errors
                      if isinstance(item, dict) and item.get('code') is not None
                  })
              print(json.dumps(safe, sort_keys=True))
              raise SystemExit(2)
          PY
