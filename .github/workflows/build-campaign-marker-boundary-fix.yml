name: Build Cpl Campaign Marker Boundary Fix

on:
  push:
    branches:
      - certify-full-cloudflare-council-20260716
    paths:
      - scripts/apply_campaign_marker_boundary_fix.py
      - .github/workflows/build-campaign-marker-boundary-fix.yml

permissions:
  contents: write

jobs:
  build-marker-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: certify-full-cloudflare-council-20260716
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/apply_campaign_marker_boundary_fix.py
      - run: python -m pip install -e . pytest
      - run: python -m pytest -q tests/test_workspace_ready_campaign.py tests/test_offline_officer_council.py tests/test_pr_reviewer.py
      - run: python -m pytest -q
      - run: git diff --check
      - name: Publish corrected product head
        run: |
          git config user.name "Sergeant Constructor"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Use bounded Cpl campaign markers [workspace-fabric-built]"
          git push origin HEAD:certify-full-cloudflare-council-20260716
