name: Model-Free Core Transfer 12
# Reviewer frozen before target selection: c936362346e3c50d91edcef72aedee4b7d38a834
# First run preserved valid 0/2 evidence; case C was unavailable because [id] was parsed as a sparse pattern.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-12.yml"
      - "scripts/run_static_training_set.py"
      - "main_review/**"

permissions:
  contents: read

jobs:
  frozen-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout frozen Sergeant reviewer
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Sparse checkout untouched transfer targets
        shell: bash
        run: |
          set -euo pipefail

          sparse_checkout() {
            local repository="$1"
            local ref="$2"
            local destination="$3"
            shift 3

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done
            git -C "$destination" fetch --depth=1 --filter=blob:none origin "$ref"
            git -C "$destination" checkout --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$ref"
          }

          sparse_checkout \
            rootlyhq/rootly-cli \
            826a2f537c1d722d32cd1ed8f613cf5be2fc1fcd \
            transfer-12/rootly-cli \
            '/internal/api/client.go'

          sparse_checkout \
            VincentShipsIt/macsweep.dev \
            015475aa3b231fb6adf1cc570e1cd10285f74f32 \
            transfer-12/macsweep \
            '/MacSweep/Sources/Core/Services/LoginItemEnumerator.swift' \
            '/MacSweep/Sources/Features/LoginItems/LoginItemsService.swift'

          sparse_checkout \
            elaris-xyz/bozPicks \
            0241560a8eccf4070519dc8e8a878c1ed1633a62 \
            transfer-12/bozpicks \
            '/apps/web/src/app/api/markets/\[id\]/predict/route.ts' \
            '/apps/web/src/lib/vault.ts'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-12-usage.json" >> "$GITHUB_ENV"

      - name: Install frozen Sergeant package
        run: python -m pip install .

      - name: Build opaque runtime manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-12
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          cases = [
              {
                  "case_id": "transfer-12-a",
                  "repository": "rootlyhq/rootly-cli",
                  "source_pr": None,
                  "checkout_path": "transfer-12/rootly-cli",
                  "changed_files": ["internal/api/client.go"],
              },
              {
                  "case_id": "transfer-12-b",
                  "repository": "VincentShipsIt/macsweep.dev",
                  "source_pr": None,
                  "checkout_path": "transfer-12/macsweep",
                  "changed_files": [
                      "MacSweep/Sources/Core/Services/LoginItemEnumerator.swift",
                      "MacSweep/Sources/Features/LoginItems/LoginItemsService.swift"
                  ],
              },
              {
                  "case_id": "transfer-12-c",
                  "repository": "elaris-xyz/bozPicks",
                  "source_pr": None,
                  "checkout_path": "transfer-12/bozpicks",
                  "changed_files": [
                      "apps/web/src/app/api/markets/[id]/predict/route.ts",
                      "apps/web/src/lib/vault.ts"
                  ],
              },
          ]
          for case in cases:
              case["defective_ref"] = subprocess.check_output(
                  ["git", "-C", case["checkout_path"], "rev-parse", "HEAD"],
                  text=True,
              ).strip()
              case["workspace_policy"] = "static_first"

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-12",
              "purpose": "Twelfth untouched transfer validation across three new repositories and ecosystems. Expected roots and later fixes remain outside Sergeant input.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "untouched_transfer_validation",
                  "reviewer_code_frozen_before_target_selection": "c936362346e3c50d91edcef72aedee4b7d38a834"
              },
              "cases": cases,
          }
          Path("build/model-free-core-transfer-12/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review on untouched revisions
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-12/runtime-manifest.json \
            --output build/model-free-core-transfer-12/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-12/frozen-summary.json

      - name: Publish frozen transfer summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 12"
            echo
            echo "Exact Sergeant head: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-12/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable transfer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-12
          path: build/model-free-core-transfer-12/
          if-no-files-found: error
          retention-days: 90
