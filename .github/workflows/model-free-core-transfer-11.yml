name: Model-Free Core Transfer 11
# Reviewer frozen before target selection: 28625057ab708a3f51a3d3210932b7ff586afd4b

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-11.yml"
      - "scripts/run_static_training_set.py"
      - "main_review/**"

permissions:
  contents: read

jobs:
  frozen-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout frozen Sergeant reviewer
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Sparse checkout untouched transfer targets
        shell: bash
        run: |
          set -euo pipefail

          sparse_checkout() {
            local repository="$1"
            local ref="$2"
            local destination="$3"
            shift 3

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done
            git -C "$destination" fetch --depth=1 --filter=blob:none origin "$ref"
            git -C "$destination" checkout --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$ref"
          }

          sparse_checkout \
            andrii-su/organon \
            ec4936b926dfcfab7dfabb21d1bbf2f7fee4b333 \
            transfer-11/organon \
            '/crates/organon-core/src/graph.rs'

          sparse_checkout \
            KanishJebaMathewM/Truxify \
            871c0ecd5d9d2732976d021f839929c7039fd2f6 \
            transfer-11/truxify \
            '/backend/api/src/services/webrtc/WebRTCSignalingServer.js'

          sparse_checkout \
            Paumen/Zonzijde \
            3c3525d52d745ac2ff158daff993ad5ada8d84e8 \
            transfer-11/zonzijde \
            '/zonzijde/net.py'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-11-usage.json" >> "$GITHUB_ENV"

      - name: Install frozen Sergeant package
        run: python -m pip install .

      - name: Build opaque runtime manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-11
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          cases = [
              {
                  "case_id": "transfer-11-a",
                  "repository": "andrii-su/organon",
                  "source_pr": None,
                  "checkout_path": "transfer-11/organon",
                  "changed_files": ["crates/organon-core/src/graph.rs"],
              },
              {
                  "case_id": "transfer-11-b",
                  "repository": "KanishJebaMathewM/Truxify",
                  "source_pr": None,
                  "checkout_path": "transfer-11/truxify",
                  "changed_files": ["backend/api/src/services/webrtc/WebRTCSignalingServer.js"],
              },
              {
                  "case_id": "transfer-11-c",
                  "repository": "Paumen/Zonzijde",
                  "source_pr": None,
                  "checkout_path": "transfer-11/zonzijde",
                  "changed_files": ["zonzijde/net.py"],
              },
          ]
          for case in cases:
              case["defective_ref"] = subprocess.check_output(
                  ["git", "-C", case["checkout_path"], "rev-parse", "HEAD"],
                  text=True,
              ).strip()
              case["workspace_policy"] = "static_first"

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-11",
              "purpose": "Eleventh untouched transfer validation across three new repositories and ecosystems. Expected roots and later fixes remain outside Sergeant input.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "untouched_transfer_validation",
                  "reviewer_code_frozen_before_target_selection": "28625057ab708a3f51a3d3210932b7ff586afd4b"
              },
              "cases": cases,
          }
          Path("build/model-free-core-transfer-11/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review on untouched revisions
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-11/runtime-manifest.json \
            --output build/model-free-core-transfer-11/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-11/frozen-summary.json

      - name: Publish frozen transfer summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 11"
            echo
            echo "Exact Sergeant head: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-11/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable transfer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-11
          path: build/model-free-core-transfer-11/
          if-no-files-found: error
          retention-days: 90
