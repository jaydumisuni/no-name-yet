name: Apply Cloudflare Certification Semantics

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-cloudflare-certification-semantics.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'cloudflare-certification-semantics'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout semantics branch
        uses: actions/checkout@v4
        with:
          ref: cloudflare-certification-semantics
          fetch-depth: 0

      - name: Apply prepared patch
        run: python tools/patch_cloudflare_certification_semantics.py

      - name: Validate focused semantics
        run: |
          python -m py_compile \
            main_review/cpl_council.py \
            main_review/llm_review.py \
            main_review/cloudflare_cli.py
          python -m pip install pytest
          python -m pytest \
            tests/test_cloudflare_certification_semantics.py \
            tests/test_cpl_council_runtime.py \
            tests/test_cloudflare_native_fallback.py \
            tests/test_cloudflare_provider.py \
            tests/test_cloudflare_roster.py \
            -q

      - name: Commit product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            main_review/cpl_council.py \
            main_review/llm_review.py \
            main_review/cloudflare_cli.py \
            tests/test_cloudflare_certification_semantics.py
          if ! git diff --cached --quiet; then
            git commit -m "Align council identity and Cloudflare certification semantics"
            git push origin HEAD:cloudflare-certification-semantics
          fi

# The permanent certification workflow is updated separately through the repository connector.
