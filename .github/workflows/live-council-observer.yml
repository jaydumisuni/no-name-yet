name: Live Council Run Observer

on:
  pull_request:
    paths:
      - ".github/workflows/live-council-observer.yml"

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Locate latest manual council proof
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          url = (
              "https://api.github.com/repos/jaydumisuni/Sergeant/actions/workflows/"
              "review-intelligence-proof.yml/runs?event=workflow_dispatch&branch=main&per_page=10"
          )
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "sergeant-live-council-observer",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)

          runs = payload.get("workflow_runs", [])
          selected = None
          for run in runs:
              if run.get("event") != "workflow_dispatch" or run.get("head_branch") != "main":
                  continue
              selected = {
                  "id": run.get("id"),
                  "run_number": run.get("run_number"),
                  "status": run.get("status"),
                  "conclusion": run.get("conclusion"),
                  "head_branch": run.get("head_branch"),
                  "head_sha": run.get("head_sha"),
                  "created_at": run.get("created_at"),
                  "updated_at": run.get("updated_at"),
                  "html_url": run.get("html_url"),
                  "display_title": run.get("display_title"),
              }
              break

          if not selected or not selected.get("id"):
              raise SystemExit("No manual Review Intelligence Proof run found on main")
          Path("live-council-run.json").write_text(
              json.dumps(selected, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(json.dumps(selected, indent=2, sort_keys=True))
          PY

      - name: Upload observer packet
        uses: actions/upload-artifact@v4
        with:
          name: live-council-run-observer
          path: live-council-run.json
          if-no-files-found: error
          retention-days: 1

