name: Model-Free Core Transfer 15
# Reviewer frozen before target selection: 00b8b7281ebe626e7fc293942c69a5a9cd537992

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-15.yml"

permissions:
  contents: read

jobs:
  frozen-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin immutable Sergeant reviewer
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach 00b8b7281ebe626e7fc293942c69a5a9cd537992
          test "$(git rev-parse HEAD)" = "00b8b7281ebe626e7fc293942c69a5a9cd537992"
          test ! -e main_review/static_transfer_15_review.py

      - name: Checkout exact defective and fixing lineages
        shell: bash
        run: |
          set -euo pipefail

          sparse_lineage_checkout() {
            local repository="$1"
            local defective="$2"
            local fixing="$3"
            local destination="$4"
            shift 4

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done

            git -C "$destination" fetch --no-tags --filter=blob:none origin "$fixing"
            git -C "$destination" cat-file -e "${defective}^{commit}"
            git -C "$destination" cat-file -e "${fixing}^{commit}"
            git -C "$destination" merge-base --is-ancestor "$defective" "$fixing"
            git -C "$destination" checkout --detach "$defective"
            test "$(git -C "$destination" rev-parse HEAD)" = "$defective"
          }

          sparse_lineage_checkout \
            homeassistant-ai/ha-mcp \
            4b5c75db520a24445bcb571196656455b8ad51b9 \
            a996f7ddcc8b618036ba79e1dba3d73122d50efc \
            transfer-15/ha-mcp \
            '/src/ha_mcp/client/rest_client.py'

          sparse_lineage_checkout \
            bee-san/kanji_anki \
            93e3fad7ef91a72bb70ce77b2f6836461ebcbefc \
            013ee4dcceee0ae38bb27edfec863dc8f8ceb7ad \
            transfer-15/kanji-anki \
            '/app/src/main/kotlin/dev/bee/kanjianki/widget/KaniWidgetRegistry.kt'

          sparse_lineage_checkout \
            tddworks/ClaudeBar \
            02d4b3c44f7d2decd2e09e6611634e38516493c4 \
            bf7334655ca79eda6712e5b4f50c79d814f59d48 \
            transfer-15/claudebar \
            '/Sources/Infrastructure/Claude/ClaudeAPIUsageProbe.swift'

          for file in \
            transfer-15/ha-mcp/src/ha_mcp/client/rest_client.py \
            transfer-15/kanji-anki/app/src/main/kotlin/dev/bee/kanjianki/widget/KaniWidgetRegistry.kt \
            transfer-15/claudebar/Sources/Infrastructure/Claude/ClaudeAPIUsageProbe.swift; do
            test -f "$file"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-15-usage.json" >> "$GITHUB_ENV"

      - name: Install frozen Sergeant package
        run: python -m pip install .

      - name: Build opaque frozen manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-15
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-15",
              "purpose": "Fifteenth untouched transfer validation across Python transport semantics, Kotlin coroutine cancellation, and Swift monetary-unit interpretation. Expected roots and fixing diffs remain outside Sergeant input.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "untouched_transfer_validation",
                  "provenance_required": True,
                  "provenance_contract": "sergeant.training-provenance.v1",
                  "reviewer_code_frozen_before_target_selection": "00b8b7281ebe626e7fc293942c69a5a9cd537992",
              },
              "cases": [
                  {
                      "case_id": "transfer-15-a",
                      "repository": "homeassistant-ai/ha-mcp",
                      "source_pr": 1966,
                      "checkout_path": "transfer-15/ha-mcp",
                      "defective_ref": "4b5c75db520a24445bcb571196656455b8ad51b9",
                      "fixing_ref": "a996f7ddcc8b618036ba79e1dba3d73122d50efc",
                      "changed_files": ["src/ha_mcp/client/rest_client.py"],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-15-b",
                      "repository": "bee-san/kanji_anki",
                      "source_pr": 557,
                      "checkout_path": "transfer-15/kanji-anki",
                      "defective_ref": "93e3fad7ef91a72bb70ce77b2f6836461ebcbefc",
                      "fixing_ref": "013ee4dcceee0ae38bb27edfec863dc8f8ceb7ad",
                      "changed_files": [
                          "app/src/main/kotlin/dev/bee/kanjianki/widget/KaniWidgetRegistry.kt"
                      ],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-15-c",
                      "repository": "tddworks/ClaudeBar",
                      "source_pr": 226,
                      "checkout_path": "transfer-15/claudebar",
                      "defective_ref": "02d4b3c44f7d2decd2e09e6611634e38516493c4",
                      "fixing_ref": "bf7334655ca79eda6712e5b4f50c79d814f59d48",
                      "changed_files": [
                          "Sources/Infrastructure/Claude/ClaudeAPIUsageProbe.swift"
                      ],
                      "workspace_policy": "static_first",
                  },
              ],
          }
          Path("build/model-free-core-transfer-15/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run pinned normal pr-review
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-15/runtime-manifest.json \
            --output build/model-free-core-transfer-15/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-15/frozen-summary.json

      - name: Publish frozen transfer summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 15"
            echo
            echo "Workflow event head: \`${GITHUB_SHA}\`"
            echo
            echo "Frozen reviewer head: \`00b8b7281ebe626e7fc293942c69a5a9cd537992\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-15/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable transfer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-15
          path: build/model-free-core-transfer-15/
          if-no-files-found: error
          retention-days: 90
