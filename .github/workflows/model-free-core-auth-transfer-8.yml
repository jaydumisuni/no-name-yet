name: Model-Free Core Auth Transfer 8

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-auth-transfer-8.yml"
      - "scripts/run_static_training_set.py"
      - "main_review/**"

permissions:
  contents: read

jobs:
  frozen-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout frozen Sergeant reviewer
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout candidate A fixing commit
        uses: actions/checkout@v4
        with:
          repository: xk1ko/aigloo
          ref: fb8529f355b624dadd8e4cfa44718b86ecd72249
          path: auth-transfer-8/aigloo
          persist-credentials: false
          fetch-depth: 2

      - name: Checkout candidate B fixing commit
        uses: actions/checkout@v4
        with:
          repository: dhruvi5319/uReport
          ref: e1e0dda28961152fb75623b0466d5c049cc608a4
          path: auth-transfer-8/ureport
          persist-credentials: false
          fetch-depth: 2

      - name: Checkout candidate C fixing commit
        uses: actions/checkout@v4
        with:
          repository: HSPK/loom
          ref: 324f9d381f0cf2766266da46535e8634bafc8562
          path: auth-transfer-8/loom
          persist-credentials: false
          fetch-depth: 2

      - name: Freeze defective parent revisions
        shell: bash
        run: |
          set -euo pipefail
          for path in auth-transfer-8/aigloo auth-transfer-8/ureport auth-transfer-8/loom; do
            git -C "$path" checkout --detach HEAD^
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-auth-transfer-8-usage.json" >> "$GITHUB_ENV"

      - name: Install frozen Sergeant package
        run: python -m pip install .

      - name: Build opaque runtime manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-auth-transfer-8
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          cases = [
              {
                  "case_id": "auth-transfer-8-a",
                  "repository": "xk1ko/aigloo",
                  "source_pr": None,
                  "checkout_path": "auth-transfer-8/aigloo",
                  "changed_files": [
                      "dashboard/src/app/login/page.tsx",
                      "dashboard/src/components/LogoutButton.tsx"
                  ],
              },
              {
                  "case_id": "auth-transfer-8-b",
                  "repository": "dhruvi5319/uReport",
                  "source_pr": None,
                  "checkout_path": "auth-transfer-8/ureport",
                  "changed_files": [
                      "frontend/src/contexts/AuthContext.tsx",
                      "frontend/src/pages/LoginPage.tsx"
                  ],
              },
              {
                  "case_id": "auth-transfer-8-c",
                  "repository": "HSPK/loom",
                  "source_pr": None,
                  "checkout_path": "auth-transfer-8/loom",
                  "changed_files": ["context/auth-context.tsx"],
              },
          ]
          for case in cases:
              case["defective_ref"] = subprocess.check_output(
                  ["git", "-C", case["checkout_path"], "rev-parse", "HEAD"],
                  text=True,
              ).strip()
              case["workspace_policy"] = "static_first"

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-auth-transfer-8",
              "purpose": "Eighth untouched transfer validation over fresh authentication Router Cache, context refresh, and query-refetch race defects. Expected roots remain outside Sergeant input.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "untouched_transfer_validation",
                  "reviewer_code_frozen_before_target_selection": "6b4761ba97c2a8a987fe89e6ce0cdd34a09c0a4e",
              },
              "cases": cases,
          }
          Path("build/model-free-core-auth-transfer-8/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review on untouched parents
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-auth-transfer-8/runtime-manifest.json \
            --output build/model-free-core-auth-transfer-8/frozen-result.json \
            2>&1 | tee build/model-free-core-auth-transfer-8/frozen-summary.json

      - name: Publish frozen transfer summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — auth transfer 8"
            echo
            echo "Exact Sergeant head: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat build/model-free-core-auth-transfer-8/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable transfer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-auth-transfer-8
          path: build/model-free-core-auth-transfer-8/
          if-no-files-found: error
          retention-days: 90
