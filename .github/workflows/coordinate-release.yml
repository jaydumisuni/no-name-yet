name: Coordinate Sergeant Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/coordinate-release.yml

permissions:
  contents: write
  actions: write

concurrency:
  group: coordinate-sergeant-release
  cancel-in-progress: false

jobs:
  release:
    name: Create and dispatch matching Sergeant release
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify coordinated versions
        id: metadata
        shell: bash
        run: |
          NPM_VERSION=$(node -p "require('./package.json').version")
          PYTHON_VERSION=$(python - <<'PY'
          import pathlib, tomllib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])
          PY
          )
          JETBRAINS_VERSION=$(grep '^pluginVersion=' adapters/jetbrains/gradle.properties | cut -d= -f2-)
          test "$NPM_VERSION" = "$PYTHON_VERSION" || {
            echo "VS Code version '$NPM_VERSION' does not match Python version '$PYTHON_VERSION'."
            exit 1
          }
          test "$JETBRAINS_VERSION" = "$NPM_VERSION-preview" || {
            echo "JetBrains version '$JETBRAINS_VERSION' does not match '$NPM_VERSION-preview'."
            exit 1
          }
          echo "version=$NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NPM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or confirm published GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi
          cat > release-notes.md <<EOF
          ## Sergeant $VERSION — Complete Command Center

          Sergeant's complete V2 Command Center is delivered in the 0.3 release line.

          ### Command Center

          - Full Commander dashboard with live workspace, branch, changed-file, mission, verdict, and history state
          - Mission Planner with briefing, priority, provider, permissions, officers, armoury, and release-gate missions
          - Live mission progress and evidence views
          - Evidence Locker with open, copy, export, refresh, and persisted report history
          - Officer deployment, armoury, Settings, Doctrine, Roadmap, and Guide
          - Compact VS Code activity-bar launcher plus full editor Command Center
          - Shared JetBrains Command Center through JCEF with a native fallback

          ### Safety

          - Read-only review by default
          - Writer mode disabled by default
          - Draft patches only
          - Human approval required
          - Never auto-merge

          ### Proof

          - CI and Sergeant Main Review passed
          - Python package tests and distribution validation passed
          - JavaScript syntax checks passed
          - Browser navigation and overflow proof passed at desktop and compact IDE widths
          - VSIX packaging passed
          - JetBrains compilation, ZIP packaging, and shared-resource inspection passed
          EOF
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target main \
            --title "Sergeant v$VERSION — Complete Command Center" \
            --notes-file release-notes.md

      - name: Dispatch all marketplace publishers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          gh workflow run publish-vscode-marketplace.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field release_tag="$TAG"

          PYPI_EXISTS=$(python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ['VERSION']
          try:
              with urllib.request.urlopen('https://pypi.org/pypi/sergeant-reviewer/json', timeout=30) as response:
                  data = json.load(response)
              print('true' if data.get('releases', {}).get(version) else 'false')
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  print('false')
              else:
                  raise
          PY
          )
          if [ "$PYPI_EXISTS" = "true" ]; then
            echo "sergeant-reviewer $VERSION already exists on PyPI; no duplicate trusted publication was dispatched."
          else
            gh workflow run publish-pypi.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref "$TAG"
          fi

          gh workflow run publish-jetbrains-marketplace.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field release_tag="$TAG"
          echo "Dispatched Visual Studio Marketplace, Open VSX, and JetBrains publication for $TAG; PyPI used the tag-qualified trusted publisher when needed."
