name: Coordinate Sergeant Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/coordinate-release.yml

permissions:
  contents: write
  actions: write

concurrency:
  group: coordinate-sergeant-release
  cancel-in-progress: false

jobs:
  release:
    name: Create and dispatch matching Sergeant release
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify coordinated versions
        id: metadata
        shell: bash
        run: |
          NPM_VERSION=$(node -p "require('./package.json').version")
          PYTHON_VERSION=$(python - <<'PY'
          import pathlib, tomllib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])
          PY
          )
          JETBRAINS_VERSION=$(grep '^pluginVersion=' adapters/jetbrains/gradle.properties | cut -d= -f2-)
          test "$NPM_VERSION" = "$PYTHON_VERSION" || {
            echo "VS Code version '$NPM_VERSION' does not match Python version '$PYTHON_VERSION'."
            exit 1
          }
          test "$JETBRAINS_VERSION" = "$NPM_VERSION-preview" || {
            echo "JetBrains version '$JETBRAINS_VERSION' does not match '$NPM_VERSION-preview'."
            exit 1
          }
          echo "version=$NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NPM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or confirm published GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi
          cat > release-notes.md <<EOF
          ## Sergeant $VERSION — Semantic Open-Model Review

          Sergeant 0.4 adds an evidence-grounded semantic review layer while keeping Main Review and deterministic proof authoritative.

          ### Provider routing

          - Free Claude Code-compatible OpenAI Responses routing
          - Local Ollama and LM Studio discovery
          - Explicit OpenAI-compatible hosted or self-hosted endpoints
          - Open-model preference: GLM-5.2, Qwen3-Coder-Next, Kimi K2.5, then provider fallback
          - Preferred, required, and disabled semantic-review policies
          - Adaptive second-model challenger for high-risk or disputed changes

          ### Review quality

          - Every accepted semantic blocker or major finding must identify a supplied path, valid line range, and repository evidence
          - Unsupported high-severity model claims are rejected before consensus
          - Dependency blast-radius and lexical risk signals are separated from demonstrated defects
          - High-risk automation changes require explicit purpose, permissions, secrets, rollback, and proof assurance
          - The actual Sergeant JSON verdict is now enforced as the Main Review merge gate

          ### Product integration

          - New sergeant pr-review command for complete deterministic-plus-semantic review
          - New sergeant llm-status command for route and privacy inspection
          - Shared semantic router controls in VS Code and JetBrains Command Centers
          - One-active-mission gates remain enforced across both IDE families
          - Coordinated VS Code and Python 0.4.0 packages plus JetBrains 0.4.0-preview

          ### Proof

          - Sergeant Main Review: APPROVE / PASS / zero required actions
          - CI and clean-clone proof passed
          - Mock FCC /v1/models and /v1/responses integration passed
          - Grounding and hallucination-rejection tests passed
          - Browser semantic-router, compact-layout, and duplicate-launch proof passed
          - Python wheel/source and VSIX validation passed
          - JetBrains compilation, ZIP packaging, and bundled-resource inspection passed

          This release provides a complete configured review gate. It does not claim that any model or tool can guarantee literal 100 percent defect detection.
          EOF
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target main \
            --title "Sergeant v$VERSION — Semantic Open-Model Review" \
            --notes-file release-notes.md

      - name: Dispatch all marketplace publishers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          gh workflow run publish-vscode-marketplace.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field release_tag="$TAG"

          PYPI_EXISTS=$(python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ['VERSION']
          try:
              with urllib.request.urlopen('https://pypi.org/pypi/sergeant-reviewer/json', timeout=30) as response:
                  data = json.load(response)
              print('true' if data.get('releases', {}).get(version) else 'false')
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  print('false')
              else:
                  raise
          PY
          )
          if [ "$PYPI_EXISTS" = "true" ]; then
            echo "sergeant-reviewer $VERSION already exists on PyPI; no duplicate trusted publication was dispatched."
          else
            gh workflow run publish-pypi.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref "$TAG"
          fi

          gh workflow run publish-jetbrains-marketplace.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field release_tag="$TAG"
          echo "Dispatched Visual Studio Marketplace, Open VSX, and JetBrains publication for $TAG; PyPI used the tag-qualified trusted publisher when needed."
