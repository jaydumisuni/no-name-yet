name: Coordinate Sergeant Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/coordinate-release.yml
      - docs/releases/v0.4.1.md
      - package.json
      - pyproject.toml
      - adapters/jetbrains/gradle.properties

permissions:
  contents: write
  actions: write

concurrency:
  group: coordinate-sergeant-release
  cancel-in-progress: false

jobs:
  release:
    name: Create and dispatch matching Sergeant release
    runs-on: ubuntu-latest

    steps:
      - name: Check out immutable release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify coordinated versions and release notes
        id: metadata
        shell: bash
        run: |
          NPM_VERSION=$(node -p "require('./package.json').version")
          PYTHON_VERSION=$(python - <<'PY'
          import pathlib, tomllib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])
          PY
          )
          JETBRAINS_VERSION=$(grep '^pluginVersion=' adapters/jetbrains/gradle.properties | cut -d= -f2-)
          NOTES="docs/releases/v${NPM_VERSION}.md"
          test "$NPM_VERSION" = "$PYTHON_VERSION" || {
            echo "VS Code version '$NPM_VERSION' does not match Python version '$PYTHON_VERSION'."
            exit 1
          }
          test "$JETBRAINS_VERSION" = "$NPM_VERSION-preview" || {
            echo "JetBrains version '$JETBRAINS_VERSION' does not match '$NPM_VERSION-preview'."
            exit 1
          }
          test -s "$NOTES" || {
            echo "Missing release notes: $NOTES"
            exit 1
          }
          echo "version=$NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "notes=$NOTES" >> "$GITHUB_OUTPUT"
          echo "release_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Create or confirm commit-bound GitHub release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
          TAG: ${{ steps.metadata.outputs.tag }}
          NOTES: ${{ steps.metadata.outputs.notes }}
          RELEASE_SHA: ${{ steps.metadata.outputs.release_sha }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          TAG_EXISTS=false
          if git show-ref --tags --verify --quiet "refs/tags/$TAG"; then
            TAG_EXISTS=true
            TAG_SHA=$(git rev-list -n 1 "$TAG")
            test "$TAG_SHA" = "$RELEASE_SHA" || {
              echo "Existing tag $TAG points to $TAG_SHA, expected proven commit $RELEASE_SHA."
              exit 1
            }
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            test "$TAG_EXISTS" = "true" || {
              echo "Release $TAG exists without a resolvable matching tag."
              exit 1
            }
            echo "Release $TAG already exists at proven commit $RELEASE_SHA."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$TAG_EXISTS" = "true" ]; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "Sergeant v$VERSION — Useful Model-Free Baseline" \
              --notes-file "$NOTES"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$RELEASE_SHA" \
              --title "Sergeant v$VERSION — Useful Model-Free Baseline" \
              --notes-file "$NOTES"
          fi

          git fetch --force --tags origin
          CREATED_TAG_SHA=$(git rev-list -n 1 "$TAG")
          test "$CREATED_TAG_SHA" = "$RELEASE_SHA" || {
            echo "Created tag $TAG points to $CREATED_TAG_SHA, expected $RELEASE_SHA."
            exit 1
          }
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Recover publishers for an existing matching release
        if: steps.release.outputs.created == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          gh workflow run publish-vscode-marketplace.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$TAG" \
            --field release_tag="$TAG"

          gh workflow run publish-pypi.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$TAG" \
            --field release_tag="$TAG"

          gh workflow run publish-jetbrains-marketplace.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$TAG" \
            --field release_tag="$TAG"

          echo "Re-dispatched all idempotent publishers from immutable tag $TAG."

      - name: Confirm first-publication dispatch path
        if: steps.release.outputs.created == 'true'
        run: echo "The release:published event dispatches all three publishers from the immutable release tag; duplicate manual dispatch is intentionally skipped."
