name: Dispatch Tagged PyPI 0.3.2

on:
  pull_request:
    paths:
      - .github/workflows/dispatch-tagged-pypi-0.3.2.yml

permissions:
  actions: write
  contents: write

jobs:
  publish-and-attach:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch trusted publisher from allowed v0.3.2 tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run publish-pypi.yml \
            --repo jaydumisuni/Sergeant \
            --ref v0.3.2
          echo 'PYPI_TAGGED_WORKFLOW_DISPATCHED'

      - name: Wait for tagged trusted-publisher workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_ID=''
          for attempt in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --repo jaydumisuni/Sergeant \
              --workflow publish-pypi.yml \
              --branch v0.3.2 \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            [ -n "$RUN_ID" ] && break
            sleep 3
          done
          test -n "$RUN_ID" || { echo 'Tagged PyPI workflow run was not created.'; exit 1; }
          echo "TAGGED_PYPI_RUN_ID=$RUN_ID"
          if ! gh run watch "$RUN_ID" --repo jaydumisuni/Sergeant --exit-status --interval 5; then
            gh run view "$RUN_ID" --repo jaydumisuni/Sergeant --log-failed || true
            exit 1
          fi

      - name: Verify PyPI 0.3.2 is public
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            if curl -fsSL https://pypi.org/pypi/sergeant-reviewer/json -o pypi.json; then
              if python - <<'PY'
          import json
          data=json.load(open('pypi.json'))
          files=data.get('releases',{}).get('0.3.2',[])
          names={item['filename'] for item in files}
          assert any(name.endswith('.whl') for name in names), names
          assert any(name.endswith('.tar.gz') for name in names), names
          print('PYPI_0_3_2_OK', sorted(names))
          PY
              then exit 0; fi
            fi
            sleep 5
          done
          exit 1

      - name: Check out current main for release artifacts
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and attach Python release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
          sha256sum dist/* > SHA256SUMS-PYPI.txt
          gh release upload v0.3.2 \
            --repo jaydumisuni/Sergeant \
            dist/* \
            SHA256SUMS-PYPI.txt \
            --clobber
