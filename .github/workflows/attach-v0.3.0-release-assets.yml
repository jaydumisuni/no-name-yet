name: Attach Sergeant v0.3.0 Release Assets

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/attach-v0.3.0-release-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build and validate all artifacts
        shell: bash
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
          npx --yes @vscode/vsce@latest package --no-dependencies --out sergeant-reviewer-0.3.0.vsix
          gradle -p adapters/jetbrains clean buildPlugin
          JB_ZIP=$(find adapters/jetbrains/build/distributions -maxdepth 1 -type f -name '*.zip' -print -quit)
          test -n "$JB_ZIP" || { echo 'JetBrains ZIP missing'; exit 1; }
          echo "JB_ZIP=$JB_ZIP" >> "$GITHUB_ENV"
          sha256sum sergeant-reviewer-0.3.0.vsix "$JB_ZIP" dist/* > SHA256SUMS.txt

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v0.3.0 \
            sergeant-reviewer-0.3.0.vsix \
            "$JB_ZIP" \
            dist/* \
            SHA256SUMS.txt \
            --clobber

      - name: Prove complete asset set
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=$(gh release view v0.3.0 --json assets --jq '.assets[].name')
          printf '%s\n' "$ASSETS"
          grep -Fx 'sergeant-reviewer-0.3.0.vsix' <<<"$ASSETS"
          grep -E '^sergeant.*0\.3\.0.*\.zip$' <<<"$ASSETS"
          grep -E '^sergeant_reviewer-0\.3\.0-.*\.whl$' <<<"$ASSETS"
          grep -Fx 'sergeant_reviewer-0.3.0.tar.gz' <<<"$ASSETS"
          grep -Fx 'SHA256SUMS.txt' <<<"$ASSETS"
