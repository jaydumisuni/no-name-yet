name: Verify Sergeant v0.3.0 Publications

on:
  pull_request:
    paths:
      - .github/workflows/verify-v0.3.0-publications.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Probe JetBrains Marketplace APIs
        shell: bash
        run: |
          set -u
          endpoints=(
            'https://plugins.jetbrains.com/api/searchPlugins?search=Sergeant'
            'https://plugins.jetbrains.com/api/plugins?pluginId=com.thetechguyds.sergeant'
            'https://plugins.jetbrains.com/api/plugin/com.thetechguyds.sergeant'
          )
          i=0
          for url in "${endpoints[@]}"; do
            i=$((i+1))
            echo "=== PROBE_$i $url ==="
            code=$(curl -sSL -o "body-$i.txt" -w '%{http_code}' "$url")
            echo "HTTP_STATUS=$code"
            cat "body-$i.txt"
            echo
            echo "=== END_PROBE_$i ==="
          done
