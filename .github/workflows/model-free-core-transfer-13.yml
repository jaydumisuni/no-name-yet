name: Model-Free Core Transfer 13
# Reviewer frozen before target selection: 6da1fb4b000d2c6040fe0aa4d632c6eb041ddc85

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-13.yml"

permissions:
  contents: read

jobs:
  frozen-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin immutable Sergeant reviewer
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach 6da1fb4b000d2c6040fe0aa4d632c6eb041ddc85
          test "$(git rev-parse HEAD)" = "6da1fb4b000d2c6040fe0aa4d632c6eb041ddc85"
          test ! -e main_review/static_transfer_13_review.py

      - name: Checkout exact defective revisions
        shell: bash
        run: |
          set -euo pipefail

          sparse_checkout() {
            local repository="$1"
            local ref="$2"
            local destination="$3"
            shift 3

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done
            git -C "$destination" fetch --depth=1 --filter=blob:none origin "$ref"
            git -C "$destination" checkout --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$ref"
          }

          sparse_checkout \
            LeanerCloud/CUDly \
            5c267c5c6034153212b6a3ad688b4e141b0b6917 \
            transfer-13/cudly \
            '/internal/api/db_rate_limiter.go' \
            '/internal/api/handler_accounts.go' \
            '/internal/api/handler_history.go' \
            '/internal/auth/service_apikeys.go'

          sparse_checkout \
            jedwards1230/gofer \
            946126e30d90730612d2888c61d5628d9421fcdf \
            transfer-13/gofer \
            '/cmd/gofer/run.go' \
            '/cmd/gofer/service.go' \
            '/cmd/gofer/tui_app.go' \
            '/internal/daemon/hello.go' \
            '/internal/supervisor/errors.go' \
            '/internal/supervisor/supervisor.go' \
            '/internal/tui/panel.go' \
            '/internal/tuibridge/bridge.go'

          sparse_checkout \
            Mikecranesync/MIRA \
            f1521bb25b2ae592ee84d121c0b39d814f7b0474 \
            transfer-13/mira \
            '/mira-bots/shared/engine.py'

          for file in \
            transfer-13/cudly/internal/api/db_rate_limiter.go \
            transfer-13/cudly/internal/api/handler_accounts.go \
            transfer-13/cudly/internal/api/handler_history.go \
            transfer-13/cudly/internal/auth/service_apikeys.go \
            transfer-13/gofer/cmd/gofer/run.go \
            transfer-13/gofer/cmd/gofer/service.go \
            transfer-13/gofer/cmd/gofer/tui_app.go \
            transfer-13/gofer/internal/daemon/hello.go \
            transfer-13/gofer/internal/supervisor/errors.go \
            transfer-13/gofer/internal/supervisor/supervisor.go \
            transfer-13/gofer/internal/tui/panel.go \
            transfer-13/gofer/internal/tuibridge/bridge.go \
            transfer-13/mira/mira-bots/shared/engine.py; do
            test -f "$file"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-13-usage.json" >> "$GITHUB_ENV"

      - name: Install frozen Sergeant package
        run: python -m pip install .

      - name: Build opaque frozen manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-13
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-13",
              "purpose": "Thirteenth untouched transfer validation across Go reliability, Go cross-path configuration, and Python state-before-slow-work semantics. Expected roots remain outside Sergeant input.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "untouched_transfer_validation",
                  "provenance_required": True,
                  "provenance_contract": "sergeant.training-provenance.v1",
                  "reviewer_code_frozen_before_target_selection": "6da1fb4b000d2c6040fe0aa4d632c6eb041ddc85",
              },
              "cases": [
                  {
                      "case_id": "transfer-13-a",
                      "repository": "LeanerCloud/CUDly",
                      "source_pr": 859,
                      "checkout_path": "transfer-13/cudly",
                      "defective_ref": "5c267c5c6034153212b6a3ad688b4e141b0b6917",
                      "changed_files": [
                          "internal/api/db_rate_limiter.go",
                          "internal/api/handler_accounts.go",
                          "internal/api/handler_history.go",
                          "internal/auth/service_apikeys.go",
                      ],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-13-b",
                      "repository": "jedwards1230/gofer",
                      "source_pr": 148,
                      "checkout_path": "transfer-13/gofer",
                      "defective_ref": "946126e30d90730612d2888c61d5628d9421fcdf",
                      "changed_files": [
                          "cmd/gofer/run.go",
                          "cmd/gofer/service.go",
                          "cmd/gofer/tui_app.go",
                          "internal/daemon/hello.go",
                          "internal/supervisor/errors.go",
                          "internal/supervisor/supervisor.go",
                          "internal/tui/panel.go",
                          "internal/tuibridge/bridge.go",
                      ],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-13-c",
                      "repository": "Mikecranesync/MIRA",
                      "source_pr": 2817,
                      "checkout_path": "transfer-13/mira",
                      "defective_ref": "f1521bb25b2ae592ee84d121c0b39d814f7b0474",
                      "changed_files": ["mira-bots/shared/engine.py"],
                      "workspace_policy": "static_first",
                  },
              ],
          }
          Path("build/model-free-core-transfer-13/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run pinned normal pr-review
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-13/runtime-manifest.json \
            --output build/model-free-core-transfer-13/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-13/frozen-summary.json

      - name: Publish frozen transfer summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 13"
            echo
            echo "Workflow event head: \`${GITHUB_SHA}\`"
            echo
            echo "Frozen reviewer head: \`6da1fb4b000d2c6040fe0aa4d632c6eb041ddc85\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-13/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable transfer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-13
          path: build/model-free-core-transfer-13/
          if-no-files-found: error
          retention-days: 90
