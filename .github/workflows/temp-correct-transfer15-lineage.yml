name: Temporary Correct Transfer 15 Lineage

on:
  push:
    branches:
      - train/model-free-core-campaign-2
    paths:
      - .github/workflows/temp-correct-transfer15-lineage.yml

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: train/model-free-core-campaign-2
          fetch-depth: 0

      - name: Pin exact ClaudeBar defective parent
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/model-free-core-transfer-15.yml')
          text = path.read_text(encoding='utf-8')
          old = '4a6f75d63776b9e4d928d4a6a22bb24313407869'
          new = '02d4b3c44f7d2decd2e09e6611634e38516493c4'
          if text.count(old) != 2:
              raise SystemExit(f'expected two ClaudeBar defective-ref occurrences, found {text.count(old)}')
          if new in text:
              raise SystemExit('exact defective parent is already present unexpectedly')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Verify immutable boundaries
        shell: bash
        run: |
          grep -q '00b8b7281ebe626e7fc293942c69a5a9cd537992' .github/workflows/model-free-core-transfer-15.yml
          test "$(grep -c '02d4b3c44f7d2decd2e09e6611634e38516493c4' .github/workflows/model-free-core-transfer-15.yml)" = 2
          grep -q 'bf7334655ca79eda6712e5b4f50c79d814f59d48' .github/workflows/model-free-core-transfer-15.yml
          grep -q 'Sources/Infrastructure/Claude/ClaudeAPIUsageProbe.swift' .github/workflows/model-free-core-transfer-15.yml

      - name: Commit correction and remove constructor
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/model-free-core-transfer-15.yml
          git rm .github/workflows/temp-correct-transfer15-lineage.yml
          git commit -m 'Correct transfer 15 ClaudeBar lineage'
          git push origin HEAD:train/model-free-core-campaign-2
