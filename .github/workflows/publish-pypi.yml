name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to verify and receive assets
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish sergeant-reviewer to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read package and release metadata
        id: metadata
        shell: bash
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.release_tag }}
        run: |
          PACKAGE_VERSION=$(python - <<'PY'
          import pathlib, tomllib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])
          PY
          )
          RELEASE_TAG="${RELEASE_EVENT_TAG:-$DISPATCH_TAG}"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches package version
        if: steps.metadata.outputs.release_tag != ''
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
          PACKAGE_VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          test "$TAG_VERSION" = "$PACKAGE_VERSION" || {
            echo "Release tag '$RELEASE_TAG' does not match pyproject.toml version '$PACKAGE_VERSION'."
            exit 1
          }

      - name: Build and validate distribution artifacts
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
          sha256sum dist/* > SHA256SUMS-PYPI.txt

      - name: Check whether this version already exists on PyPI
        id: registry
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          python - <<'PY' > registry-status.txt
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ['PACKAGE_VERSION']
          try:
              with urllib.request.urlopen('https://pypi.org/pypi/sergeant-reviewer/json', timeout=30) as response:
                  data = json.load(response)
              exists = bool(data.get('releases', {}).get(version))
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  exists = False
              else:
                  raise
          print('true' if exists else 'false')
          PY
          EXISTS=$(cat registry-status.txt)
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
          echo "PyPI version ${{ steps.metadata.outputs.version }} exists: $EXISTS"

      - name: Publish to PyPI with trusted publishing
        if: steps.registry.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Confirm existing PyPI publication
        if: steps.registry.outputs.exists == 'true'
        run: echo "sergeant-reviewer ${{ steps.metadata.outputs.version }} is already published on PyPI."

      - name: Attach Python distributions and checksums to GitHub Release
        if: steps.metadata.outputs.release_tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" dist/* SHA256SUMS-PYPI.txt --clobber
