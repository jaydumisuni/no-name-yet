name: Refine Cpl Gap Classification

on:
  push:
    branches:
      - cpl-quality-adjudication
    paths:
      - .github/workflows/refine-cpl-gap-classification.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cpl-quality-adjudication
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply reviewed refinement
        run: python tools/refine_cpl_gap_classification.py
      - name: Run focused proof
        run: python -m pytest tests/test_cpl_finding_adjudication.py tests/test_cpl_council_verdict.py -q
      - name: Commit product changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add main_review/finding_adjudication.py tests/test_cpl_finding_adjudication.py docs/29-cpl-finding-adjudication.md
          git diff --cached --check
          git commit -m "Keep required assurance gaps verdict-affecting"
          git push origin HEAD:cpl-quality-adjudication
