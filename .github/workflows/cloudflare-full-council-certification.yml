name: Full Cloudflare Council Compatibility Constructor

on:
  pull_request:
    branches: [cpl-quality-noise-governor]
    paths:
      - '.github/workflows/cloudflare-full-council-certification.yml'
      - 'scripts/construct_full_council_compat.py'
      - 'scripts/cloudflare_full_council_certification.yml.txt'

permissions:
  contents: write

jobs:
  construct:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout proof branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Apply full council compatibility correction
        run: |
          python scripts/construct_full_council_compat.py
          git checkout -- .github/workflows/cloudflare-full-council-certification.yml
          git checkout -- .github/workflows/build-full-council-compatibility.yml || true

      - name: Compile constructed modules
        run: |
          python -m py_compile \
            main_review/cloudflare_cli.py \
            main_review/cloudflare_models.py \
            main_review/cloudflare_scout_qualification.py \
            main_review/llm_provider.py \
            tests/test_cloudflare_full_roster_qualification.py

      - name: Commit constructed product
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Qualify the complete Cloudflare council by role'
          git push origin HEAD:${{ github.head_ref }}
