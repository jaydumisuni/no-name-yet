name: Full Cloudflare Council Test Diagnostic

on:
  pull_request:
    branches: [cpl-quality-noise-governor]
    paths:
      - '.github/workflows/cloudflare-full-council-certification.yml'

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Sergeant
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Capture focused test output
        id: tests
        shell: bash
        run: |
          mkdir -p build
          set +e
          python -m pytest -vv \
            tests/test_cloudflare_full_roster_qualification.py \
            tests/test_cloudflare_mission_qualification.py \
            tests/test_llm_provider.py \
            > build/full-council-focused-tests.txt 2>&1
          code=$?
          set -e
          cat build/full-council-focused-tests.txt
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Upload focused test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-council-focused-test-diagnostic
          path: build/full-council-focused-tests.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce focused tests
        if: always()
        run: exit '${{ steps.tests.outputs.exit_code }}'
