name: Full Cloudflare Council Compatibility Constructor

on:
  pull_request:
    branches: [cpl-quality-noise-governor]
    paths:
      - '.github/workflows/cloudflare-full-council-certification.yml'
      - 'scripts/construct_full_council_compat.py'
      - 'scripts/cloudflare_full_council_certification.yml.txt'

permissions:
  contents: write

jobs:
  construct:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout proof branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Apply full council compatibility correction
        run: python scripts/construct_full_council_compat.py

      - name: Run focused construction tests
        run: python -m pytest -q tests/test_cloudflare_full_roster_qualification.py tests/test_cloudflare_mission_qualification.py tests/test_llm_provider.py

      - name: Commit constructed product and restore live proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Qualify the complete Cloudflare council by role'
          git push origin HEAD:${{ github.head_ref }}
