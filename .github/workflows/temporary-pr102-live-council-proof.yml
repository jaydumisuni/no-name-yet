name: Temporary PR 102 Live Council Proof

on:
  push:
    branches: [cpl-quality-noise-governor]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_CPL_PROVIDER: cloudflare
      SERGEANT_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SERGEANT_CLOUDFLARE_ACCOUNT_ID }}
      SERGEANT_CLOUDFLARE_API_TOKEN: ${{ secrets.SERGEANT_CLOUDFLARE_API_TOKEN }}
      SERGEANT_CPL_POLICY: required
      SERGEANT_CPL_ENABLED: "true"
      SERGEANT_CPL_MODELS: "@cf/qwen/qwen3-30b-a3b-fp8,@cf/openai/gpt-oss-20b"
      SERGEANT_CPL_DEPTH: adaptive
      SERGEANT_CPL_MAX_COUNCIL_MEMBERS: "5"
      SERGEANT_CPL_MAX_ROUNDS: "3"
      SERGEANT_CPL_MAX_OUTPUT_TOKENS: "1200"
      SERGEANT_CPL_MAX_INPUT_CHARS: "30000"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Confirm exact PR head and permanent public file set
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          git diff --name-only "origin/${{ github.event.repository.default_branch }}...HEAD" | sort > changed-files.txt
          cat > expected-files.txt <<'EOF'
          .github/workflows/temporary-pr102-live-council-proof.yml
          docs/38-cpl-noise-governor-and-route-failover.md
          main_review/cpl_council.py
          main_review/cpl_noise.py
          main_review/cpl_runtime.py
          main_review/llm_review.py
          main_review/pr_reviewer.py
          main_review/review_benchmark.py
          tests/test_cpl_noise_governor.py
          EOF
          sort -o expected-files.txt expected-files.txt
          diff -u expected-files.txt changed-files.txt
      - name: Prove Cloudflare route
        run: sergeant cpl-status --require
      - name: Run ten-case blind council benchmark
        run: |
          mkdir -p proof
          sergeant-bench review-benchmarks/blind \
            --mode council \
            --require-route \
            --include-packets \
            --minimum-precision 0.90 \
            --minimum-recall 0.90 \
            --pretty \
            --output proof/live-council-benchmark.json
      - name: Scan proof for credentials
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path
          roots = [Path('proof'), Path('changed-files.txt')]
          secrets = [
              os.environ.get('SERGEANT_CLOUDFLARE_API_TOKEN', ''),
              os.environ.get('SERGEANT_CLOUDFLARE_ACCOUNT_ID', ''),
          ]
          files = []
          for root in roots:
              if root.is_file(): files.append(root)
              elif root.exists(): files.extend(p for p in root.rglob('*') if p.is_file())
          for path in files:
              data = path.read_bytes()
              for secret in secrets:
                  if secret and secret.encode() in data:
                      raise SystemExit(f'credential material found in {path}')
          print(f'scanned {len(files)} proof files; no configured credential material found')
          PY
      - name: Upload live proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr102-live-council-proof
          path: |
            proof/
            changed-files.txt
          if-no-files-found: warn
