name: Apply PR103 Verified Review Fixes

on:
  pull_request:
    branches: [cpl-quality-noise-governor]
    paths:
      - '.github/workflows/apply-pr103-verified-review-fixes.yml'
      - 'scripts/apply_pr103_verified_review_fixes.py'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Apply verified source fixes
        run: python scripts/apply_pr103_verified_review_fixes.py

      - name: Remove temporary repair machinery
        run: |
          rm scripts/apply_pr103_verified_review_fixes.py
          rm .github/workflows/apply-pr103-verified-review-fixes.yml

      - name: Compile corrected modules
        run: |
          python -m py_compile \
            main_review/cloudflare_cli.py \
            main_review/llm_provider.py

      - name: Commit permanent corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Correct council response and coverage validation'
          git push origin HEAD:${{ github.head_ref }}
