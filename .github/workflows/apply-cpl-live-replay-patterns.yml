name: Apply Cpl Live Replay Patterns

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-cpl-live-replay-patterns.yml'
      - 'tools/apply_cpl_live_replay_patterns.py'

permissions:
  contents: write

jobs:
  construct:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply live replay patterns
        run: python tools/apply_cpl_live_replay_patterns.py

      - name: Compile and run full regression suite
        run: |
          python -m py_compile main_review/cpl_council.py main_review/cpl_noise.py
          python -m pip install --upgrade pip pytest
          python -m pip install -e .
          python -m pytest -q

      - name: Commit pattern correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add main_review/cpl_council.py tests/test_cpl_noise_governor.py
          if git diff --cached --quiet; then
            echo 'Live replay patterns already applied.'
            exit 0
          fi
          git commit -m 'Normalize live authorization and SQL finding variants'
          git push origin HEAD:${{ github.head_ref }}
