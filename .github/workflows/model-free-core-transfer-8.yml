name: Model-Free Core Transfer 8

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-8.yml"
      - "scripts/run_static_training_set.py"
      - "main_review/**"

permissions:
  contents: read

jobs:
  frozen-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout frozen Sergeant reviewer
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout untrusted submodule defective revision
        uses: actions/checkout@v4
        with:
          repository: kdlbs/kandev
          ref: 5fb1923a9a09434f1023fe6469ef6813a10ce4c8
          path: transfer-8/kandev
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout offline queue defective revision
        uses: actions/checkout@v4
        with:
          repository: mhosseinab/market-ops
          ref: 33b4a67f549faa7f90a9659bdde9c2f70add1956
          path: transfer-8/market-ops
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout webhook durability defective revision
        uses: actions/checkout@v4
        with:
          repository: LabsConnected/litlabs-website
          ref: 2c40ce282e9fc56c093bfee5394ebc354321f3ed
          path: transfer-8/litlabs
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-8-usage.json" >> "$GITHUB_ENV"

      - name: Install frozen Sergeant package
        run: python -m pip install .

      - name: Build opaque runtime manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-8
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          cases = [
              {
                  "case_id": "transfer-8-a",
                  "repository": "kdlbs/kandev",
                  "source_pr": None,
                  "checkout_path": "transfer-8/kandev",
                  "changed_files": ["apps/backend/internal/worktree/submodule.go"],
              },
              {
                  "case_id": "transfer-8-b",
                  "repository": "mhosseinab/market-ops",
                  "source_pr": None,
                  "checkout_path": "transfer-8/market-ops",
                  "changed_files": [
                      "apps/extension/src/lib/queue.ts",
                      "apps/extension/src/lib/storage.ts"
                  ],
              },
              {
                  "case_id": "transfer-8-c",
                  "repository": "LabsConnected/litlabs-website",
                  "source_pr": None,
                  "checkout_path": "transfer-8/litlabs",
                  "changed_files": ["litlabs/src/app/api/stripe/webhook/route.ts"],
              },
          ]
          for case in cases:
              case["defective_ref"] = subprocess.check_output(
                  ["git", "-C", case["checkout_path"], "rev-parse", "HEAD"],
                  text=True,
              ).strip()
              case["workspace_policy"] = "static_first"

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-8",
              "purpose": "Eighth untouched transfer validation across untrusted Git execution, offline queue durability, and webhook acknowledgement/idempotency. Expected roots remain outside Sergeant input.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "untouched_transfer_validation",
                  "reviewer_code_frozen_before_target_selection": "97bfde346c3e74e27cb5c8303b5e892221204265"
              },
              "cases": cases,
          }
          Path("build/model-free-core-transfer-8/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review on untouched revisions
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-8/runtime-manifest.json \
            --output build/model-free-core-transfer-8/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-8/frozen-summary.json

      - name: Publish frozen transfer summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 8"
            echo
            echo "Exact Sergeant head: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-8/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable transfer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-8
          path: build/model-free-core-transfer-8/
          if-no-files-found: error
          retention-days: 90
