name: Model-Free Core Transfer 27 Learned Closure

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-27-learned-closure.yml"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"
      REVIEWER_SHA: dae6766767e57927c47a367bb6bf9fad045fc08d

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin learned reviewer
        shell: bash
        run: |
          set -euo pipefail
          git cat-file -e "${REVIEWER_SHA}^{commit}"
          git checkout --detach "${REVIEWER_SHA}"
          test "$(git rev-parse HEAD)" = "${REVIEWER_SHA}"
          test -e main_review/static_transfer_27_review.py
          grep -q 'sergeant.static-transfer-27-review.v1' main_review/static_transfer_27_review.py
          grep -q 'static_transfer_27_review' main_review/static_remote_contract_review.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install control dependency
        run: python -m pip install pytest

      - name: Prepare evidence and prove controls
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          mkdir -p build/model-free-core-transfer-27-learned
          python -m pytest -q \
            tests/test_opaque_selector_v8.py \
            tests/test_static_transfer_27_review.py \
            2>&1 | tee build/model-free-core-transfer-27-learned/controls.log

      - name: Checkout frozen defective snapshots
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import subprocess
          from pathlib import Path

          cases = [
              (
                  "llvm/llvm-project",
                  "6ed829baa3861adbe053c16878fbae74b9c1e9d6",
                  "0113b250ebb4af79a1c5342cc423a49383f08921",
                  ["llvm/lib/Transforms/InstCombine/InstCombineVectorOps.cpp"],
              ),
              (
                  "apache/kafka",
                  "260a39724d3d82a11957ea4689f5ca8f00e60ad3",
                  "8de50bdb0814fd8af169dd4619bf622fb655a8c9",
                  ["core/src/main/java/kafka/server/share/DelayedShareFetch.java"],
              ),
              (
                  "pandas-dev/pandas",
                  "d982e59797d94f7f7bb3e6ed8b1f2a23fe6601b0",
                  "afd641a4bf4f0393fd4020159330c3c874267d43",
                  ["pandas/core/generic.py", "pandas/core/resample.py"],
              ),
          ]

          for index, (repository, defective, fixing, files) in enumerate(cases, start=1):
              destination = Path("transfer-27-learned") / f"case-{index}"
              destination.mkdir(parents=True, exist_ok=False)
              subprocess.run(["git", "init", str(destination)], check=True)
              subprocess.run(
                  [
                      "git", "-C", str(destination), "remote", "add", "origin",
                      f"https://github.com/{repository}.git",
                  ],
                  check=True,
              )
              subprocess.run(
                  ["git", "-C", str(destination), "config", "core.sparseCheckout", "true"],
                  check=True,
              )
              (destination / ".git" / "info" / "sparse-checkout").write_text(
                  "".join(f"/{path}\n" for path in files),
                  encoding="utf-8",
              )
              for ref in (fixing, defective):
                  subprocess.run(
                      [
                          "git", "-C", str(destination), "fetch", "--no-tags",
                          "--filter=blob:none", "origin", ref,
                      ],
                      check=True,
                  )
              subprocess.run(
                  ["git", "-C", str(destination), "merge-base", "--is-ancestor", defective, fixing],
                  check=True,
              )
              subprocess.run(
                  ["git", "-C", str(destination), "checkout", "--detach", defective],
                  check=True,
              )
              if subprocess.check_output(
                  ["git", "-C", str(destination), "rev-parse", "HEAD"], text=True
              ).strip() != defective:
                  raise SystemExit(f"checkout identity mismatch for {repository}")
              for relative in files:
                  if not (destination / relative).is_file():
                      raise SystemExit(f"requested source missing: {repository}:{relative}")
          PY

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-27-learned-usage.json" >> "$GITHUB_ENV"

      - name: Install pinned Sergeant package
        run: python -m pip install .

      - name: Build learned-only manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-27-learned",
              "purpose": (
                  "Learned closure for the three immutable transfer-27 false negatives. "
                  "The original 0/3 fresh score remains unchanged."
              ),
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "learned_closure_only",
                  "frozen_first_pass_run": 29768558691,
                  "frozen_first_pass_artifact": 8471827745,
                  "frozen_first_pass_digest": "sha256:b865b7cf4a8d9cede2973c90cf9932642903ab7e5ed11bceb33969efd92106d0",
                  "reviewer_code": "dae6766767e57927c47a367bb6bf9fad045fc08d",
              },
              "cases": [
                  {
                      "case_id": "transfer-27-a",
                      "repository": "llvm/llvm-project",
                      "source_pr": 169120,
                      "defective_ref": "6ed829baa3861adbe053c16878fbae74b9c1e9d6",
                      "fixing_ref": "0113b250ebb4af79a1c5342cc423a49383f08921",
                      "checkout_path": "transfer-27-learned/case-1",
                      "changed_files": ["llvm/lib/Transforms/InstCombine/InstCombineVectorOps.cpp"],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-27-b",
                      "repository": "apache/kafka",
                      "source_pr": 22881,
                      "defective_ref": "260a39724d3d82a11957ea4689f5ca8f00e60ad3",
                      "fixing_ref": "8de50bdb0814fd8af169dd4619bf622fb655a8c9",
                      "checkout_path": "transfer-27-learned/case-2",
                      "changed_files": ["core/src/main/java/kafka/server/share/DelayedShareFetch.java"],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-27-c",
                      "repository": "pandas-dev/pandas",
                      "source_pr": 64793,
                      "defective_ref": "d982e59797d94f7f7bb3e6ed8b1f2a23fe6601b0",
                      "fixing_ref": "afd641a4bf4f0393fd4020159330c3c874267d43",
                      "checkout_path": "transfer-27-learned/case-3",
                      "changed_files": ["pandas/core/generic.py", "pandas/core/resample.py"],
                      "workspace_policy": "static_first",
                  },
              ],
          }
          Path("build/model-free-core-transfer-27-learned/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review learned closure
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-27-learned/runtime-manifest.json \
            --output build/model-free-core-transfer-27-learned/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-27-learned/frozen-summary.json

      - name: Publish learned summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 27 learned closure"
            echo
            echo "Workflow event head: \`${GITHUB_SHA}\`"
            echo "Pinned reviewer: \`${REVIEWER_SHA}\`"
            echo "Original fresh result remains: \`0/3\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-27-learned/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable learned reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-27-learned
          path: build/model-free-core-transfer-27-learned/
          if-no-files-found: error
          retention-days: 90
