name: Model-Free Core Transfer 26 Learned Closure
# Learned reviewer frozen after transfer 26 first-pass 0/2 valid: 80885cbfa25a60b96def90ff3951eb209e3082a0

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-26-learned.yml"
      - "main_review/static_transfer_26_review.py"
      - "main_review/static_remote_contract_review.py"
      - "tests/test_static_transfer_26_review.py"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"
      REVIEWER_SHA: 80885cbfa25a60b96def90ff3951eb209e3082a0

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin green learned Sergeant reviewer
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "${REVIEWER_SHA}"
          test "$(git rev-parse HEAD)" = "${REVIEWER_SHA}"
          test -e main_review/static_transfer_26_review.py
          grep -q 'sergeant.static-transfer-26-review.v1' main_review/static_transfer_26_review.py
          grep -q 'sergeant.static-remote-contract-review.v7' main_review/static_remote_contract_review.py
          grep -q 'run_static_transfer_26_review' main_review/static_remote_contract_review.py
          grep -q 'sergeant.static-status-review.v34' main_review/static_status_review.py

      - name: Checkout curl defective revision
        uses: actions/checkout@v4
        with:
          repository: curl/curl
          ref: cae12480fc7bef73b612f45b09faf62c780d8975
          path: transfer-26/curl
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            lib/http2.c

      - name: Checkout Cabal defective revision
        uses: actions/checkout@v4
        with:
          repository: haskell/cabal
          ref: f2d22e7f861582eeea72f91d5a7b6ef1632ee473
          path: transfer-26/cabal
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            Cabal-syntax/src/Distribution/Fields/ParseResult.hs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-26-learned-usage.json" >> "$GITHUB_ENV"

      - name: Install learned Sergeant package
        run: python -m pip install .

      - name: Build learned closure manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/model-free-core-transfer-26-learned
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          reviewer = os.environ["REVIEWER_SHA"]
          cases = [
              {
                  "case_id": "transfer-26-a",
                  "repository": "curl/curl",
                  "source_pr": 11384,
                  "checkout_path": "transfer-26/curl",
                  "defective_ref": "cae12480fc7bef73b612f45b09faf62c780d8975",
                  "fixing_ref": "29f33b3400431e23afc85d6ec23427864104d730",
                  "changed_files": ["lib/http2.c"],
                  "workspace_policy": "static_first",
              },
              {
                  "case_id": "transfer-26-b",
                  "repository": "haskell/cabal",
                  "source_pr": 11479,
                  "checkout_path": "transfer-26/cabal",
                  "defective_ref": "f2d22e7f861582eeea72f91d5a7b6ef1632ee473",
                  "fixing_ref": "aa2d74b1c0c9141c150555f0aac2a38115294f66",
                  "changed_files": ["Cabal-syntax/src/Distribution/Fields/ParseResult.hs"],
                  "workspace_policy": "static_first",
              },
          ]
          for case in cases:
              actual = subprocess.check_output(
                  ["git", "-C", case["checkout_path"], "rev-parse", "HEAD"],
                  text=True,
              ).strip()
              if actual != case["defective_ref"]:
                  raise SystemExit(f"defective revision mismatch: {case['repository']}")

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-26-learned",
              "purpose": (
                  "Learned closure for the two valid transfer-26 defects. "
                  "Babashka PR 1992 is excluded as a capability addition, not a pre-existing defect."
              ),
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "classification": "learned_closure",
                  "historical_fresh_score_immutable": True,
                  "historical_valid_fresh_score": "0/2",
                  "selector_exclusions": 1,
                  "reviewer_code": reviewer,
              },
              "cases": cases,
          }
          Path("build/model-free-core-transfer-26-learned/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review learned closure
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-26-learned/runtime-manifest.json \
            --output build/model-free-core-transfer-26-learned/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-26-learned/frozen-summary.json

      - name: Upload immutable learned reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-26-learned
          path: build/model-free-core-transfer-26-learned/
          if-no-files-found: error
          retention-days: 90
