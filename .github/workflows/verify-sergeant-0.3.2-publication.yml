name: Verify Sergeant 0.3.2 Publication

on:
  pull_request:
    paths:
      - .github/workflows/verify-sergeant-0.3.2-publication.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub release 0.3.2
    runs-on: ubuntu-latest
    steps:
      - name: Verify published release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/jaydumisuni/Sergeant/releases/tags/v0.3.2 > release.json
          python - <<'PY'
          import json
          data=json.load(open('release.json'))
          assert data['tag_name']=='v0.3.2'
          assert data['draft'] is False
          assert data['prerelease'] is False
          print('GITHUB_RELEASE_0_3_2_OK', data['name'])
          PY

  pypi:
    name: PyPI 0.3.2
    runs-on: ubuntu-latest
    steps:
      - name: Verify wheel and source distribution
        run: |
          curl -fsSL https://pypi.org/pypi/sergeant-reviewer/json -o pypi.json
          python - <<'PY'
          import json
          data=json.load(open('pypi.json'))
          files=data.get('releases',{}).get('0.3.2',[])
          names={item['filename'] for item in files}
          assert any(name.endswith('.whl') for name in names), names
          assert any(name.endswith('.tar.gz') for name in names), names
          print('PYPI_0_3_2_OK', sorted(names))
          PY

  visual-studio-marketplace:
    name: Visual Studio Marketplace 0.3.2
    runs-on: ubuntu-latest
    steps:
      - name: Verify extension version
        run: |
          cat > query.json <<'JSON'
          {"filters":[{"criteria":[{"filterType":7,"value":"thetechguyds.sergeant-reviewer"}]}],"flags":914}
          JSON
          curl -fsSL -X POST \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json;api-version=7.2-preview.1' \
            --data @query.json \
            https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery \
            -o marketplace.json
          python - <<'PY'
          import json
          data=json.load(open('marketplace.json'))
          extensions=[item for result in data.get('results',[]) for item in result.get('extensions',[])]
          assert extensions, data
          versions=[item.get('version') for item in extensions[0].get('versions',[])]
          assert '0.3.2' in versions, versions[:20]
          print('VSMARKET_0_3_2_OK', versions[:10])
          PY

  open-vsx:
    name: Open VSX 0.3.2
    runs-on: ubuntu-latest
    steps:
      - name: Verify extension version
        run: |
          curl -fsSL https://open-vsx.org/api/thetechguyds/sergeant-reviewer -o openvsx.json
          python - <<'PY'
          import json
          data=json.load(open('openvsx.json'))
          versions=data.get('allVersions',{})
          assert data.get('version')=='0.3.2' or '0.3.2' in versions, (data.get('version'), sorted(versions))
          print('OPENVSX_0_3_2_OK', data.get('version'))
          PY

  jetbrains:
    name: JetBrains 0.3.2 preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.0.0"
      - name: Publish or confirm preview version
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          test -n "$JETBRAINS_MARKETPLACE_TOKEN" || { echo 'JETBRAINS_MARKETPLACE_TOKEN is missing'; exit 1; }
          set +e
          OUTPUT=$(gradle -p adapters/jetbrains publishPlugin --stacktrace 2>&1)
          STATUS=$?
          set -e
          printf '%s\n' "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            echo 'JETBRAINS_0_3_2_UPLOAD_ACCEPTED'
            exit 0
          fi
          printf '%s' "$OUTPUT" | grep -Fqi 'already contains version 0.3.2-preview in channel preview' && {
            echo 'JETBRAINS_0_3_2_ALREADY_PRESENT'
            exit 0
          }
          exit "$STATUS"
