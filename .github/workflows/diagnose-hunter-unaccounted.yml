name: Diagnose Hunter Unaccounted Controls

on:
  push:
    branches:
      - proof/hunter-mobile-header-20260721
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: diagnose-hunter-unaccounted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify Chrome
        run: test -x /usr/bin/google-chrome
      - name: Dump unaccounted controls
        env:
          CHROME_PATH: /usr/bin/google-chrome
          HUNTER_REVIEW_URL: https://f7ee0437-hunter-ui-review.thetechguy712.workers.dev/portal
          PROOF_DIR: artifacts/hunter-unaccounted
        run: node tools/diagnose_hunter_unaccounted_controls.mjs
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hunter-unaccounted-controls
          path: artifacts/hunter-unaccounted
          if-no-files-found: error
          retention-days: 14
