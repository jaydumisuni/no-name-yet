name: Apply PR103 Rate Limit Fix

on:
  pull_request:
    branches: [cpl-quality-noise-governor]
    paths:
      - '.github/workflows/apply-pr103-rate-limit-fix.yml'
      - 'scripts/apply_pr103_rate_limit_fix.py'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - run: python scripts/apply_pr103_rate_limit_fix.py
      - run: |
          rm scripts/apply_pr103_rate_limit_fix.py
          rm .github/workflows/apply-pr103-rate-limit-fix.yml
          python -m py_compile main_review/llm_provider.py
      - shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Distinguish transient throttling from daily quota exhaustion'
          git push origin HEAD:${{ github.head_ref }}
