name: Apply Cloudflare Fallback Patch

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-cloudflare-fallback-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'cloudflare-native-response-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: cloudflare-native-response-fallback
          fetch-depth: 0

      - name: Apply staged patches
        run: |
          python tools/patch_llm_provider_cloudflare.py
          python tools/patch_cloudflare_probe.py

      - name: Validate focused patch
        run: |
          python -m py_compile main_review/llm_provider.py main_review/cloudflare_models.py main_review/cloudflare_cli.py
          python -m pip install pytest
          python -m pytest tests/test_cloudflare_native_fallback.py tests/test_cloudflare_provider.py tests/test_cloudflare_roster.py -q

      - name: Commit patch to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main_review/llm_provider.py main_review/cloudflare_models.py main_review/cloudflare_cli.py tests/test_cloudflare_native_fallback.py
          git commit -m "Add Cloudflare native response fallback"
          git push origin HEAD:cloudflare-native-response-fallback
