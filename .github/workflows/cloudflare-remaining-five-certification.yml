name: Remaining Five Cloudflare Council Certification

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/cloudflare-remaining-five-certification.yml'

permissions:
  actions: read
  contents: read

concurrency:
  group: cloudflare-remaining-five-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

env:
  SERGEANT_BASELINE_SHA: '3c6be1f063ac0f21f5519041b0f564bc59735833'

jobs:
  validate-targeted-retry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact certification head without credentials
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify immutable baseline and workflow-only scope
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$EVENT_BASE_SHA" = "$SERGEANT_BASELINE_SHA"
          mapfile -t changed < <(git diff --name-only "$EVENT_BASE_SHA" "$EVENT_HEAD_SHA")
          test "${#changed[@]}" -eq 1
          test "${changed[0]}" = '.github/workflows/cloudflare-remaining-five-certification.yml'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prove provider, ledger and quota code without secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          python -m pytest -q \
            tests/test_cloudflare_incremental_certification.py \
            tests/test_cloudflare_mission_qualification.py \
            tests/test_cloudflare_usage_governor.py

  retry-unresolved-candidates:
    needs: validate-targeted-retry
    environment: sergeant-cloudflare-certification
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_CPL_ENABLED: 'true'
      SERGEANT_CPL_POLICY: required
      SERGEANT_CPL_PROVIDER: cloudflare
      SERGEANT_CPL_DEPTH: maximum
      SERGEANT_CLOUDFLARE_TIMEOUT_SECONDS: '90'
      SERGEANT_CLOUDFLARE_USAGE_STATE: build/cloudflare-usage-state.json
      SERGEANT_CLOUDFLARE_DAILY_BUDGET_NEURONS: ${{ vars.SERGEANT_CLOUDFLARE_DAILY_BUDGET_NEURONS || '10000' }}
      SERGEANT_CLOUDFLARE_SAFETY_RESERVE_NEURONS: ${{ vars.SERGEANT_CLOUDFLARE_SAFETY_RESERVE_NEURONS || '2500' }}
      SERGEANT_CLOUDFLARE_UNKNOWN_MODEL_RESERVATION_NEURONS: ${{ vars.SERGEANT_CLOUDFLARE_UNKNOWN_MODEL_RESERVATION_NEURONS || '2500' }}
    steps:
      - name: Checkout exact certification head without persisted credentials
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the proved Sergeant examiner before secrets are exposed
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Restore the exact partial ledger and shared usage state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p build /tmp/remaining-five
          artifact_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=cloudflare-remaining-five-ledger&per_page=100" \
            --jq '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[0].id // empty')"
          test -n "$artifact_id"
          gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > /tmp/remaining-five.zip
          unzip -o /tmp/remaining-five.zip -d /tmp/remaining-five >/dev/null
          cp /tmp/remaining-five/remaining-five-ledger.json build/remaining-five-ledger.json
          cp /tmp/remaining-five/cloudflare-usage-state.json build/cloudflare-usage-state.json

      - name: Create fixed role fixtures
        run: |
          mkdir -p build/retry-fixture/src
          cat > build/retry-fixture/src/scout.py <<'PY'
          RETRY_LIMIT = 3
          TIMEOUT_SECONDS = 15
          SUPPORTED_LANGUAGES = ["python", "javascript"]
          PY
          cat > build/retry-fixture/src/auth.py <<'PY'
          import subprocess

          def run_user_command(request):
              command = request.args.get("command")
              return subprocess.run(command, shell=True)
          PY

      - name: Retry Granite and Qwen2.5-Coder once each
        id: retry
        env:
          SERGEANT_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SERGEANT_CLOUDFLARE_ACCOUNT_ID }}
          SERGEANT_CLOUDFLARE_API_TOKEN: ${{ secrets.SERGEANT_CLOUDFLARE_API_TOKEN }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          from typing import Any

          from main_review.cloudflare_cli import cloudflare_route
          from main_review.cloudflare_gateway import CloudflareGatewaySettings
          from main_review.cloudflare_incremental_certification import (
              CERTIFICATION_SCHEMA,
              CONTRACT_VERSION,
              _safe_error,
              load_ledger,
              save_ledger,
          )
          from main_review.llm_provider import LLMProviderError, invoke_json

          BASELINE = os.environ["SERGEANT_BASELINE_SHA"]
          LEDGER = Path("build/remaining-five-ledger.json")
          ROOT = Path("build/retry-fixture")
          GRANITE = "@cf/ibm-granite/granite-4.0-h-micro"
          QWEN = "@cf/qwen/qwen2.5-coder-32b-instruct"
          REQUIRED_EXISTING = {
              "@cf/zai-org/glm-4.7-flash",
              "@cf/openai/gpt-oss-120b",
              "@cf/moonshotai/kimi-k2.7-code",
          }

          ledger = load_ledger(LEDGER, BASELINE)
          members = ledger.setdefault("members", {})
          assert all(
              isinstance(members.get(model), dict)
              and members[model].get("status") == "certified"
              for model in REQUIRED_EXISTING
          ), "The saved three-member checkpoint was not restored."

          def now() -> str:
              return datetime.now(timezone.utc).isoformat()

          def record(model: str, *, passed: bool, response: dict[str, Any] | None = None, error: str = "") -> dict[str, Any]:
              kind = _safe_error(error)
              status = "certified" if passed else "failed"
              if kind == "http_429_code_4006_daily_allocation":
                  status = "quota_blocked"
                  ledger["quota_blocked_day"] = datetime.now(timezone.utc).date().isoformat()
              elif kind == "local_budget_blocked":
                  status = "budget_blocked"
                  ledger["budget_blocked"] = True
                  ledger["budget_blocked_day"] = datetime.now(timezone.utc).date().isoformat()
              result = {
                  "model": model,
                  "status": status,
                  "structured_transport_passed": passed,
                  "role_mission_passed": passed,
                  "proof_type": "targeted-role-mission-v1",
                  "error_kind": kind,
                  "response": response,
                  "tested_at": now(),
              }
              members[model] = result
              save_ledger(LEDGER, ledger)
              return result

          results: list[dict[str, Any]] = []
          stopped_reason = ""

          # Granite: concise Scout mission with an explicit bookkeeping contract.
          if not (
              isinstance(members.get(GRANITE), dict)
              and members[GRANITE].get("status") == "certified"
          ):
              os.environ["SERGEANT_CLOUDFLARE_MODELS"] = GRANITE
              settings = CloudflareGatewaySettings.from_environment()
              route = cloudflare_route(settings, model=GRANITE, max_output_tokens=500)
              source = (ROOT / "src/scout.py").read_text(encoding="utf-8")
              system_prompt = (
                  "Return exactly one JSON object and nothing else. You are Sergeant Scout. "
                  "Extract only facts visibly present in the supplied file. Do not classify defects."
              )
              user_prompt = json.dumps({
                  "model": GRANITE,
                  "path": "src/scout.py",
                  "source": source,
                  "required_schema": {
                      "status": "ready",
                      "model": GRANITE,
                      "coverage": {
                          "files_reviewed": ["src/scout.py"],
                          "areas": ["evidence extraction"],
                      },
                      "facts": [
                          {"name": "constant name", "value": "exact value", "line": 1}
                      ],
                  },
                  "instruction": "Return every assignment constant with its exact JSON value and 1-based source line.",
              })
              try:
                  payload = invoke_json(route, system_prompt=system_prompt, user_prompt=user_prompt)
                  coverage = payload.get("coverage") if isinstance(payload.get("coverage"), dict) else {}
                  reviewed = coverage.get("files_reviewed") if isinstance(coverage.get("files_reviewed"), list) else []
                  areas = coverage.get("areas") if isinstance(coverage.get("areas"), list) else []
                  facts = payload.get("facts") if isinstance(payload.get("facts"), list) else []
                  observed = {
                      str(item.get("name")): (item.get("value"), item.get("line"))
                      for item in facts
                      if isinstance(item, dict) and item.get("name")
                  }
                  expected = {
                      "RETRY_LIMIT": (3, 1),
                      "TIMEOUT_SECONDS": (15, 2),
                      "SUPPORTED_LANGUAGES": (["python", "javascript"], 3),
                  }
                  passed = bool(
                      payload.get("status") == "ready"
                      and payload.get("model") == GRANITE
                      and "src/scout.py" in {str(item) for item in reviewed}
                      and any("evidence" in str(item).lower() or "extraction" in str(item).lower() for item in areas)
                      and observed == expected
                  )
                  results.append(record(GRANITE, passed=passed, response={
                      "status": payload.get("status"),
                      "model": payload.get("model"),
                      "coverage": coverage,
                      "facts": facts,
                  }))
              except LLMProviderError as error:
                  result = record(GRANITE, passed=False, error=str(error))
                  results.append(result)
                  if result["status"] in {"quota_blocked", "budget_blocked"}:
                      stopped_reason = result["status"]

          # Qwen2.5-Coder: compact evidence-grounded security mission.
          if not stopped_reason and not (
              isinstance(members.get(QWEN), dict)
              and members[QWEN].get("status") == "certified"
          ):
              os.environ["SERGEANT_CLOUDFLARE_MODELS"] = QWEN
              settings = CloudflareGatewaySettings.from_environment()
              route = cloudflare_route(settings, model=QWEN, max_output_tokens=1100)
              source = (ROOT / "src/auth.py").read_text(encoding="utf-8")
              system_prompt = (
                  "Return exactly one valid JSON object and nothing else: no Markdown, prose, or code fence. "
                  "You are Sergeant Medic performing a bounded security review from source evidence."
              )
              user_prompt = json.dumps({
                  "model": QWEN,
                  "path": "src/auth.py",
                  "source": source,
                  "objective": "Determine whether untrusted request input can reach shell execution and report the grounded blocker if present.",
                  "required_schema": {
                      "status": "ready",
                      "model": QWEN,
                      "verdict": "PASS|NEEDS WORK|BLOCK",
                      "coverage": {
                          "files_reviewed": ["src/auth.py"],
                          "areas": ["security"],
                      },
                      "findings": [{
                          "path": "src/auth.py",
                          "line": 1,
                          "category": "security",
                          "severity": "blocker",
                          "message": "root cause",
                          "evidence": "exact source evidence",
                          "evidence_verified": True,
                      }],
                  },
              })
              try:
                  payload = invoke_json(route, system_prompt=system_prompt, user_prompt=user_prompt)
                  coverage = payload.get("coverage") if isinstance(payload.get("coverage"), dict) else {}
                  reviewed = coverage.get("files_reviewed") if isinstance(coverage.get("files_reviewed"), list) else []
                  areas = coverage.get("areas") if isinstance(coverage.get("areas"), list) else []
                  findings = payload.get("findings") if isinstance(payload.get("findings"), list) else []
                  match = next((
                      item for item in findings
                      if isinstance(item, dict)
                      and item.get("path") == "src/auth.py"
                      and str(item.get("category") or "").lower() == "security"
                      and str(item.get("severity") or "").lower() == "blocker"
                      and item.get("evidence_verified") is True
                      and "shell=true" in str(item.get("evidence") or "").lower().replace(" ", "")
                  ), None)
                  passed = bool(
                      payload.get("status") == "ready"
                      and payload.get("model") == QWEN
                      and payload.get("verdict") == "BLOCK"
                      and "src/auth.py" in {str(item) for item in reviewed}
                      and any("security" in str(item).lower() for item in areas)
                      and match
                  )
                  results.append(record(QWEN, passed=passed, response={
                      "status": payload.get("status"),
                      "model": payload.get("model"),
                      "verdict": payload.get("verdict"),
                      "coverage": coverage,
                      "findings": findings,
                  }))
              except LLMProviderError as error:
                  result = record(QWEN, passed=False, error=str(error))
                  results.append(result)
                  if result["status"] in {"quota_blocked", "budget_blocked"}:
                      stopped_reason = result["status"]

          expected_models = [
              GRANITE,
              "@cf/zai-org/glm-4.7-flash",
              QWEN,
              "@cf/openai/gpt-oss-120b",
              "@cf/moonshotai/kimi-k2.7-code",
          ]
          certified = [
              model for model in expected_models
              if isinstance(members.get(model), dict)
              and members[model].get("status") == "certified"
          ]
          aggregate = {
              "schema_version": CERTIFICATION_SCHEMA,
              "contract_version": CONTRACT_VERSION,
              "tested_sha": BASELINE,
              "attempt_head": os.getenv("GITHUB_SHA", ""),
              "expected_models": expected_models,
              "certified_models": certified,
              "pending_models": [model for model in expected_models if model not in certified],
              "certified_member_count": len(certified),
              "passed": len(certified) == len(expected_models),
              "stopped_reason": stopped_reason,
              "targeted_retry_results": results,
          }
          Path("build/remaining-five-targeted-retry-summary.json").write_text(
              json.dumps(aggregate, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Verify credentials are absent from retry evidence
        id: credential_scan
        if: always()
        env:
          SERGEANT_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.SERGEANT_CLOUDFLARE_ACCOUNT_ID }}
          SERGEANT_CLOUDFLARE_API_TOKEN: ${{ secrets.SERGEANT_CLOUDFLARE_API_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          values = [
              os.getenv("SERGEANT_CLOUDFLARE_ACCOUNT_ID", ""),
              os.getenv("SERGEANT_CLOUDFLARE_API_TOKEN", ""),
          ]
          artifacts = [
              Path("build/remaining-five-ledger.json"),
              Path("build/cloudflare-usage-state.json"),
              Path("build/remaining-five-targeted-retry-summary.json"),
          ]
          for path in artifacts:
              assert path.is_file(), f"Missing evidence: {path}"
              text = path.read_text(encoding="utf-8", errors="replace")
              for value in values:
                  if value:
                      assert value not in text, f"Configured provider value appeared in {path}"
          PY

      - name: Upload the updated resumable ledger
        if: always() && steps.credential_scan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-remaining-five-ledger
          path: |
            build/remaining-five-ledger.json
            build/cloudflare-usage-state.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload targeted retry evidence
        if: always() && steps.credential_scan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-remaining-five-targeted-retry
          path: |
            build/remaining-five-targeted-retry-summary.json
            build/remaining-five-ledger.json
            build/cloudflare-usage-state.json
          if-no-files-found: error
          retention-days: 90

      - name: Enforce five accepted candidate contracts or an honest pause
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("build/remaining-five-targeted-retry-summary.json").read_text(encoding="utf-8"))
          if payload.get("stopped_reason"):
              raise SystemExit(f"Certification paused honestly: {payload['stopped_reason']}")
          assert payload.get("passed") is True, "Granite and/or Qwen2.5-Coder remain uncertified."
          assert payload.get("certified_member_count") == 5
          PY
