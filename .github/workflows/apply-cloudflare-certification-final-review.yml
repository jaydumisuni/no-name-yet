name: Apply Cloudflare Certification Final Review

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-cloudflare-certification-final-review.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'cloudflare-certification-semantics'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout semantics branch without persisted credentials
        uses: actions/checkout@v4
        with:
          ref: cloudflare-certification-semantics
          fetch-depth: 0
          persist-credentials: false

      - name: Apply final reviewed fixes
        run: python tools/finalize_cloudflare_certification_review.py

      - name: Validate final reviewed semantics
        run: |
          python -m py_compile \
            main_review/cpl_council.py \
            main_review/cpl_runtime.py \
            main_review/llm_review.py \
            main_review/cloudflare_cli.py
          python -m pip install pytest
          python -m pytest \
            tests/test_cloudflare_certification_semantics.py \
            tests/test_cpl_council_runtime.py \
            tests/test_cloudflare_native_fallback.py \
            tests/test_cloudflare_provider.py \
            tests/test_cloudflare_roster.py \
            -q

      - name: Commit final product files
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            main_review/cpl_council.py \
            main_review/llm_review.py \
            main_review/cloudflare_cli.py \
            tests/test_cloudflare_certification_semantics.py
          if ! git diff --cached --quiet; then
            git commit -m "Resolve final Cloudflare certification review findings"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/jaydumisuni/Sergeant.git" HEAD:cloudflare-certification-semantics
          fi
