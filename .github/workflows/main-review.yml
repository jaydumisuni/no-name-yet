name: Main Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  main-review:
    runs-on: ubuntu-latest
    env:
      SERGEANT_LLM_ENABLED: ${{ vars.SERGEANT_LLM_ENABLED || 'false' }}
      SERGEANT_LLM_POLICY: ${{ vars.SERGEANT_LLM_POLICY || 'preferred' }}
      SERGEANT_LLM_PROVIDER: ${{ vars.SERGEANT_LLM_PROVIDER || 'auto' }}
      SERGEANT_LLM_BASE_URL: ${{ vars.SERGEANT_LLM_BASE_URL }}
      SERGEANT_LLM_MODEL: ${{ vars.SERGEANT_LLM_MODEL }}
      SERGEANT_LLM_PROTOCOL: ${{ vars.SERGEANT_LLM_PROTOCOL || 'auto' }}
      SERGEANT_LLM_COUNCIL: ${{ vars.SERGEANT_LLM_COUNCIL || 'adaptive' }}
      SERGEANT_LLM_API_KEY: ${{ secrets.SERGEANT_LLM_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Apply one-time static review integration
        run: |
          python scripts/apply_review_finish_patch.py
          python scripts/apply_last_coderabbit_fix.py

      - name: Commit integrated static review capabilities
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "sergeant-review-constructor"
          git config user.email "sergeant-review-constructor@users.noreply.github.com"
          git add main_review/static_invariant_review.py main_review/offline_investigation.py main_review/capability_policy.py main_review/officer_council.py
          if git diff --cached --quiet; then
            echo "Static review integration already applied."
          else
            git commit -m "Integrate final static review capabilities"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Main Review
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e .

      - name: Build changed file list
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed-files.txt

      - name: Run independent Main Review
        run: |
          python - <<'PY'
          from pathlib import Path
          from main_review.github_bot import write_github_review_payload

          files = Path('changed-files.txt').read_text(encoding='utf-8').splitlines()
          write_github_review_payload('main-review-result.json', '.', changed_files=files)
          PY

      - name: Publish Sergeant verdict summary
        if: always()
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          path = Path('main-review-result.json')
          if not path.exists():
              print('## Sergeant Main Review\n\nNo review payload was produced.')
              raise SystemExit(0)
          payload = json.loads(path.read_text(encoding='utf-8'))
          packet = payload.get('packet', {})
          verdict = packet.get('verdict', {})
          semantic = packet.get('semantic_review', {})
          route = semantic.get('route') or {}
          print('## Sergeant Main Review')
          print()
          print(f"- Action: **{payload.get('action', 'UNKNOWN')}**")
          print(f"- Consensus: **{packet.get('consensus', {}).get('consensus', 'UNKNOWN')}**")
          print(f"- Required actions: **{len(verdict.get('required_actions', []))}**")
          print(f"- Semantic status: **{semantic.get('status', 'unknown')}**")
          print(f"- Semantic model: **{route.get('model', 'unavailable')}**")
          print(f"- Semantic verdict: **{semantic.get('verdict', 'unknown')}**")
          PY

      - name: Enforce actual Sergeant verdict
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('main-review-result.json').read_text(encoding='utf-8'))
          action = payload.get('action')
          packet = payload.get('packet', {})
          required = packet.get('verdict', {}).get('required_actions', [])
          consensus = packet.get('consensus', {}).get('consensus')
          if action != 'APPROVE' or required or consensus != 'PASS':
              print(payload.get('body', 'Sergeant did not approve this change.'))
              raise SystemExit(
                  f"Sergeant gate failed: action={action}, consensus={consensus}, required_actions={len(required)}"
              )
          print('Sergeant gate passed: APPROVE / PASS / no required actions.')
          PY

      - name: Upload Main Review result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-review-result
          path: main-review-result.json
          if-no-files-found: error

      - name: Checkout VolSync defective revision
        uses: actions/checkout@v4
        with:
          repository: falconizmi/volsync
          ref: 51d41534a5b38b1274b7bfbf03b05caec6d2775b
          path: holdout-cases/volsync
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            internal/controller/mover/syncthing
            go.mod
            README.md

      - name: Checkout Controller Reliability defective revision
        uses: actions/checkout@v4
        with:
          repository: Johnfv5nk/Controller-reliability
          ref: f90b3e490bffcba7e3dd69881840580b59680fe7
          path: holdout-cases/controller-reliability
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            internal/controller
            go.mod
            README.md

      - name: Checkout Odoo Job Worker defective revision
        uses: actions/checkout@v4
        with:
          repository: OpenSPP/odoo-job-worker
          ref: 6cf0f5f6527a896e0ae950b178df6369001f0d6f
          path: holdout-cases/odoo-job-worker
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            job_worker
            pyproject.toml
            README.md

      - name: Freeze Sergeant-first final holdout reports
        env:
          SERGEANT_LLM_ENABLED: "false"
          SERGEANT_CPL_ENABLED: "false"
          SERGEANT_CPL_POLICY: "disabled"
          SERGEANT_CLOUDFLARE_USAGE_STATE: ${{ runner.temp }}/sergeant-holdout-usage.json
        run: |
          mkdir -p build/static-holdout
          python scripts/run_static_training_set.py \
            review-training/unseen-holdout-set-1.json \
            --output build/static-holdout/unseen-holdout-set-1.json \
            | tee build/static-holdout/unseen-holdout-set-1-summary.json

      - name: Publish final holdout summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          path = Path('build/static-holdout/unseen-holdout-set-1.json')
          if not path.exists():
              print('\n## Final unseen static holdout\n\nNo report was produced.')
              raise SystemExit(0)
          data = json.loads(path.read_text())
          print('\n## Final unseen static holdout')
          print('\n| Case | Verdict | Admitted | Advisory | Assurances | Models |')
          print('|---|---:|---:|---:|---:|---:|')
          for item in data['summaries']:
              print(
                  f"| {item['case_id']} | {item['verdict']} | {item['admitted_finding_count']} | "
                  f"{item['advisory_finding_count']} | {item['unresolved_assurance_count']} | {item['model_calls']} |"
              )
          PY

      - name: Upload immutable final holdout reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-holdout-unseen-set-1
          path: build/static-holdout/
          if-no-files-found: error
          retention-days: 90
