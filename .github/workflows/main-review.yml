name: Main Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  main-review:
    runs-on: ubuntu-latest
    env:
      # Semantic review remains off in public CI unless the repository owner
      # explicitly configures a route. Product/IDE default is preferred mode.
      SERGEANT_LLM_ENABLED: ${{ vars.SERGEANT_LLM_ENABLED || 'false' }}
      SERGEANT_LLM_POLICY: ${{ vars.SERGEANT_LLM_POLICY || 'preferred' }}
      SERGEANT_LLM_PROVIDER: ${{ vars.SERGEANT_LLM_PROVIDER || 'auto' }}
      SERGEANT_LLM_BASE_URL: ${{ vars.SERGEANT_LLM_BASE_URL }}
      SERGEANT_LLM_MODEL: ${{ vars.SERGEANT_LLM_MODEL }}
      SERGEANT_LLM_PROTOCOL: ${{ vars.SERGEANT_LLM_PROTOCOL || 'auto' }}
      SERGEANT_LLM_COUNCIL: ${{ vars.SERGEANT_LLM_COUNCIL || 'adaptive' }}
      SERGEANT_LLM_API_KEY: ${{ secrets.SERGEANT_LLM_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Main Review
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e .

      - name: Build changed file list
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed-files.txt

      - name: Run independent Main Review
        run: |
          python - <<'PY'
          from pathlib import Path
          from main_review.github_bot import write_github_review_payload

          files = Path('changed-files.txt').read_text(encoding='utf-8').splitlines()
          write_github_review_payload('main-review-result.json', '.', changed_files=files)
          PY

      - name: Publish Sergeant verdict summary
        if: always()
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          path = Path('main-review-result.json')
          if not path.exists():
              print('## Sergeant Main Review\n\nNo review payload was produced.')
              raise SystemExit(0)
          payload = json.loads(path.read_text(encoding='utf-8'))
          packet = payload.get('packet', {})
          verdict = packet.get('verdict', {})
          semantic = packet.get('semantic_review', {})
          route = semantic.get('route') or {}
          print('## Sergeant Main Review')
          print()
          print(f"- Action: **{payload.get('action', 'UNKNOWN')}**")
          print(f"- Consensus: **{packet.get('consensus', {}).get('consensus', 'UNKNOWN')}**")
          print(f"- Required actions: **{len(verdict.get('required_actions', []))}**")
          print(f"- Semantic status: **{semantic.get('status', 'unknown')}**")
          print(f"- Semantic model: **{route.get('model', 'unavailable')}**")
          print(f"- Semantic verdict: **{semantic.get('verdict', 'unknown')}**")
          PY

      - name: Enforce actual Sergeant verdict
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('main-review-result.json').read_text(encoding='utf-8'))
          action = payload.get('action')
          packet = payload.get('packet', {})
          required = packet.get('verdict', {}).get('required_actions', [])
          consensus = packet.get('consensus', {}).get('consensus')
          if action != 'APPROVE' or required or consensus != 'PASS':
              print(payload.get('body', 'Sergeant did not approve this change.'))
              raise SystemExit(
                  f"Sergeant gate failed: action={action}, consensus={consensus}, required_actions={len(required)}"
              )
          print('Sergeant gate passed: APPROVE / PASS / no required actions.')
          PY

      - name: Upload Main Review result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-review-result
          path: main-review-result.json
          if-no-files-found: error

      - name: Checkout Matrix defective revision
        uses: actions/checkout@v4
        with:
          repository: matrix-org/matrix-js-sdk
          ref: 82c488d155eb3cef97a116b4007c772a2d3421b6
          path: training-cases/matrix-js-sdk
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            src/rust-crypto
            spec/unit/rust-crypto
            spec/integ/crypto
            package.json
            tsconfig.json
            README.md

      - name: Checkout Camel defective revision
        uses: actions/checkout@v4
        with:
          repository: apache/camel
          ref: 9971a57276a27db5549bffd032044b4abb45b6a9
          path: training-cases/camel
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            core/camel-core-processor
            core/camel-core
            pom.xml
            README.md

      - name: Checkout Marimo defective revision
        uses: actions/checkout@v4
        with:
          repository: marimo-team/marimo
          ref: 791f228d9b1ad6f47e4c8ab10a19d31858b8ece3
          path: training-cases/marimo
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            frontend/src/plugins/impl
            frontend/package.json
            marimo/_runtime/packages
            tests/_runtime/packages
            pyproject.toml
            README.md

      - name: Freeze Sergeant-first unseen project reports
        env:
          SERGEANT_LLM_ENABLED: "false"
          SERGEANT_CPL_ENABLED: "false"
          SERGEANT_CPL_POLICY: "disabled"
          SERGEANT_CLOUDFLARE_USAGE_STATE: ${{ runner.temp }}/sergeant-training-usage.json
        run: |
          mkdir -p build/static-training
          python scripts/run_static_training_set.py \
            review-training/unseen-development-set-1.json \
            --output build/static-training/unseen-development-set-1.json \
            | tee build/static-training/unseen-development-set-1-summary.json

      - name: Publish unseen project summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          path = Path('build/static-training/unseen-development-set-1.json')
          if not path.exists():
              print('\n## Unseen static development set\n\nNo report was produced.')
              raise SystemExit(0)
          data = json.loads(path.read_text())
          print('\n## Unseen static development set')
          print('\n| Case | Verdict | Admitted | Advisory | Assurances | Models |')
          print('|---|---:|---:|---:|---:|---:|')
          for item in data['summaries']:
              print(
                  f"| {item['case_id']} | {item['verdict']} | {item['admitted_finding_count']} | "
                  f"{item['advisory_finding_count']} | {item['unresolved_assurance_count']} | {item['model_calls']} |"
              )
          PY

      - name: Upload immutable Sergeant-first training reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-training-unseen-development-set-1
          path: build/static-training/
          if-no-files-found: error
          retention-days: 90
