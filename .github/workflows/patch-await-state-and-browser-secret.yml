name: Patch await-state and browser-secret integration

on:
  push:
    branches:
      - train/model-free-core-campaign-2
    paths:
      - ".github/workflows/patch-await-state-and-browser-secret.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: train/model-free-core-campaign-2
          fetch-depth: 1

      - name: Wire static officer and secret context
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          invariant = Path("main_review/static_invariant_review.py")
          text = invariant.read_text(encoding="utf-8")
          import_marker = "from .static_cross_path_review import run_static_cross_path_review\n"
          new_import = "from .static_await_state_review import run_static_await_state_review\n"
          assert import_marker in text
          if new_import not in text:
              text = text.replace(import_marker, new_import + import_marker, 1)
          call_marker = "    status_review = run_static_status_review(root_path, changed)\n    findings.extend(dict(item) for item in status_review.get(\"findings\", []) if isinstance(item, dict))\n"
          new_call = call_marker + "    await_state_review = run_static_await_state_review(root_path, changed)\n    findings.extend(dict(item) for item in await_state_review.get(\"findings\", []) if isinstance(item, dict))\n"
          assert call_marker in text
          if "await_state_review = run_static_await_state_review" not in text:
              text = text.replace(call_marker, new_call, 1)
          invariant.write_text(text, encoding="utf-8")

          evidence = Path("main_review/evidence.py")
          text = evidence.read_text(encoding="utf-8")
          helper_marker = '''def _placeholder_secret(match: re.Match[str]) -> bool:
    if match.lastindex is None or match.lastindex < 2:
        return False
    value = match.group(2).strip().lower()
    normalized = re.sub(r"[^a-z0-9_-]+", "", value)
    return normalized in SECRET_PLACEHOLDERS or normalized.startswith(("example-", "fake-", "test-", "your-"))
'''
          helper = helper_marker + '''

_PUBLIC_BROWSER_SUFFIXES = {".js", ".jsx", ".ts", ".tsx", ".html"}
_FIREBASE_PUBLIC_MARKERS = (
    "authdomain",
    "projectid",
    "storagebucket",
    "messagingsenderid",
    "appid",
)


def _public_browser_client_api_key(
    path: str,
    lines: list[str],
    line_index: int,
    match: re.Match[str],
) -> bool:
    if Path(path).suffix.lower() not in _PUBLIC_BROWSER_SUFFIXES:
        return False
    if match.lastindex is None or match.lastindex < 1:
        return False
    key_name = re.sub(r"[^a-z]", "", match.group(1).lower())
    if key_name != "apikey":
        return False
    start = max(0, line_index - 12)
    end = min(len(lines), line_index + 13)
    window = "\\n".join(lines[start:end]).lower()
    firebase_context = (
        "firebaseconfig" in window
        or "initializeapp(" in window
        or "firebaseapp.com" in window
        or "firebaseio.com" in window
    )
    marker_count = sum(marker in window for marker in _FIREBASE_PUBLIC_MARKERS)
    return firebase_context and marker_count >= 3
'''
          assert helper_marker in text
          if "def _public_browser_client_api_key" not in text:
              text = text.replace(helper_marker, helper, 1)
          old_condition = '''                    if match is None or (label == "generic api key assignment" and _placeholder_secret(match)):
                        continue
'''
          new_condition = '''                    if match is None:
                        continue
                    if label == "generic api key assignment" and (
                        _placeholder_secret(match)
                        or _public_browser_client_api_key(file.path, lines, number - 1, match)
                    ):
                        continue
'''
          assert old_condition in text
          text = text.replace(old_condition, new_condition, 1)
          evidence.write_text(text, encoding="utf-8")

          Path(".github/workflows/patch-await-state-and-browser-secret.yml").unlink()
          PY

      - name: Run focused regression proof
        shell: bash
        run: |
          python -m pip install -e . pytest
          pytest -q \
            tests/test_static_await_state_review.py \
            tests/test_public_browser_api_key_context.py \
            tests/test_pr_review_static_invariant_integration.py

      - name: Commit production integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Generalize await-state review across source languages"
          git push
