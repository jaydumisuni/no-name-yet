name: Repair Sergeant v0.3.0 Publications

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-v0.3.0-publication.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-sergeant-v0.3.0
  cancel-in-progress: false

jobs:
  repair:
    name: Publish missing registries and attach release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Verify versions and secrets
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          python - <<'PY'
          import json, pathlib, tomllib
          npm = json.loads(pathlib.Path('package.json').read_text(encoding='utf-8'))['version']
          py = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          props = dict(line.split('=', 1) for line in pathlib.Path('adapters/jetbrains/gradle.properties').read_text(encoding='utf-8').splitlines() if '=' in line)
          jb = props['pluginVersion']
          assert npm == py == '0.3.0', (npm, py)
          assert jb == '0.3.0-preview', jb
          PY
          test -n "$VSCE_PAT" || { echo "VSCE_PAT is missing"; exit 1; }
          test -n "$OVSX_PAT" || { echo "OVSX_PAT is missing"; exit 1; }
          test -n "$JETBRAINS_MARKETPLACE_TOKEN" || { echo "JETBRAINS_MARKETPLACE_TOKEN is missing"; exit 1; }

      - name: Build all release artifacts
        shell: bash
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
          npx --yes @vscode/vsce@latest package --no-dependencies --out sergeant-reviewer-0.3.0.vsix
          gradle -p adapters/jetbrains clean buildPlugin
          JB_ZIP=$(find adapters/jetbrains/build/distributions -maxdepth 1 -type f -name '*.zip' -print -quit)
          test -n "$JB_ZIP" || { echo "JetBrains ZIP missing"; exit 1; }
          echo "JB_ZIP=$JB_ZIP" >> "$GITHUB_ENV"
          sha256sum sergeant-reviewer-0.3.0.vsix "$JB_ZIP" dist/* > SHA256SUMS.txt

      - name: Publish or confirm Visual Studio Marketplace
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set +e
          OUTPUT=$(npx --yes @vscode/vsce@latest publish --packagePath sergeant-reviewer-0.3.0.vsix --pat "$VSCE_PAT" 2>&1)
          STATUS=$?
          set -e
          printf '%s\n' "$OUTPUT"
          if [ $STATUS -eq 0 ]; then exit 0; fi
          printf '%s' "$OUTPUT" | grep -Eqi 'already exists|already been published|version .* exists|version .* was already published' && exit 0
          exit $STATUS

      - name: Ensure Open VSX namespace exists
        shell: bash
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set +e
          OUTPUT=$(npx --yes ovsx@latest create-namespace thetechguyds --pat "$OVSX_PAT" 2>&1)
          STATUS=$?
          set -e
          printf '%s\n' "$OUTPUT"
          if [ $STATUS -eq 0 ]; then exit 0; fi
          printf '%s' "$OUTPUT" | grep -Eqi 'already exists|already claimed|namespace.*exists|namespace.*claimed' && exit 0
          exit $STATUS

      - name: Publish or confirm Open VSX
        shell: bash
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set +e
          OUTPUT=$(npx --yes ovsx@latest publish sergeant-reviewer-0.3.0.vsix --pat "$OVSX_PAT" 2>&1)
          STATUS=$?
          set -e
          printf '%s\n' "$OUTPUT"
          if [ $STATUS -eq 0 ]; then exit 0; fi
          printf '%s' "$OUTPUT" | grep -Eqi 'already exists|already published|version .* exists|extension version.*exists' && exit 0
          exit $STATUS

      - name: Publish or confirm JetBrains preview
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          set +e
          OUTPUT=$(gradle -p adapters/jetbrains publishPlugin --stacktrace 2>&1)
          STATUS=$?
          set -e
          printf '%s\n' "$OUTPUT"
          if [ $STATUS -eq 0 ]; then exit 0; fi
          printf '%s' "$OUTPUT" | grep -Eqi 'already exists|already uploaded|version .* exists|plugin version.*exists' && exit 0
          exit $STATUS

      - name: Attach all artifacts to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v0.3.0 \
            sergeant-reviewer-0.3.0.vsix \
            "$JB_ZIP" \
            dist/* \
            SHA256SUMS.txt \
            --clobber

      - name: Final asset proof
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=$(gh release view v0.3.0 --json assets --jq '.assets[].name')
          printf '%s\n' "$ASSETS"
          printf '%s\n' "$ASSETS" | grep -Fx 'sergeant-reviewer-0.3.0.vsix'
          printf '%s\n' "$ASSETS" | grep -E '^sergeant.*0\.3\.0.*\.zip$'
          printf '%s\n' "$ASSETS" | grep -E '^sergeant_reviewer-0\.3\.0-.*\.whl$'
          printf '%s\n' "$ASSETS" | grep -Fx 'sergeant_reviewer-0.3.0.tar.gz'
          printf '%s\n' "$ASSETS" | grep -Fx 'SHA256SUMS.txt'
