name: Apply Cpl Runtime Compatibility

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-cpl-runtime-compat.yml'
      - 'tools/apply_cpl_runtime_compat.py'

permissions:
  contents: write

jobs:
  construct:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply compatibility patch
        run: python tools/apply_cpl_runtime_compat.py

      - name: Run full regression suite
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e .
          python -m pytest -q

      - name: Commit compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add main_review/cpl_runtime.py
          if git diff --cached --quiet; then
            echo 'Compatibility patch already applied.'
            exit 0
          fi
          git commit -m 'Preserve Cpl runtime transport seam with failover'
          git push origin HEAD:${{ github.head_ref }}
