name: Apply Cloudflare Mission Qualification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout constructor branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply exact patch
        run: |
          sed -i 's/if count != 1:/if count < 1:/' tools/apply_cloudflare_mission_qualification.py
          python tools/apply_cloudflare_mission_qualification.py

      - name: Install and prove patch
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build
          {
            python -m pip install --upgrade pip
            python -m pip install -e . pytest
            python -m py_compile main_review/cloudflare_cli.py
            pytest -q \
              tests/test_cloudflare_gateway.py \
              tests/test_cloudflare_mission_qualification.py \
              tests/test_cloudflare_certification_semantics.py
            pytest -q
          } 2>&1 | tee build/cloudflare-mission-patch-proof.log

      - name: Stage and verify product diff
        shell: bash
        run: |
          set -o pipefail
          git add \
            .github/workflows/cloudflare-live-certification.yml \
            docs/27-cloudflare-live-certification.md \
            main_review/cloudflare_cli.py \
            tests/test_cloudflare_mission_qualification.py
          git diff --cached > build/cloudflare-mission-product.patch
          git diff --cached --check 2>&1 | tee build/cloudflare-mission-commit-proof.log

      - name: Commit proven product changes
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Qualify Cloudflare models against full officer missions'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Upload constructor proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-mission-patch-proof
          path: |
            build/cloudflare-mission-patch-proof.log
            build/cloudflare-mission-commit-proof.log
            build/cloudflare-mission-product.patch
          if-no-files-found: warn
          retention-days: 3
