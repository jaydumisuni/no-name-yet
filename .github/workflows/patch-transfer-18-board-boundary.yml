name: Patch Transfer 18 Board Boundary

on:
  pull_request:
    paths:
      - ".github/workflows/patch-transfer-18-board-boundary.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout training branch
        uses: actions/checkout@v4
        with:
          ref: train/model-free-core-campaign-2
          fetch-depth: 0
          persist-credentials: true

      - name: Tighten board-consistency falsifier
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("main_review/static_transfer_18_review.py")
          text = path.read_text(encoding="utf-8")
          old = (
              '        r"readPlatformBoard|parseYaml[^\\n]*(?:board|variant)|board(?:Mismatch|Disagree|Matches)|"\n'
              '        r"request-change-board|board_reselect|yaml[^\\n]{0,120}board_id|board_id[^\\n]{0,120}yaml",\n'
          )
          new = (
              '        r"readPlatformBoard|parseYaml[^\\n]*(?:board|variant)|board(?:Mismatch|Disagree|Matches)|"\n'
              '        r"yaml[^\\n]{0,120}board_id|board_id[^\\n]{0,120}yaml",\n'
          )
          if text.count(old) != 1:
              raise SystemExit(f"expected one board boundary marker, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Run focused board and full transfer 18 controls
        run: |
          python -m pip install . pytest
          python -m pytest \
            tests/test_static_transfer_18_board_review.py \
            tests/test_static_transfer_18_auth_review.py \
            tests/test_static_transfer_18_thenable_review.py -q

      - name: Remove constructor and commit patch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/patch-transfer-18-board-boundary.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main_review/static_transfer_18_review.py .github/workflows/patch-transfer-18-board-boundary.yml
          git commit -m "Tighten transfer 18 board authority evidence"
          git push origin HEAD:train/model-free-core-campaign-2
