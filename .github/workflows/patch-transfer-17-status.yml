name: Patch Transfer 17 Status Integration

on:
  pull_request:
    paths:
      - ".github/workflows/patch-transfer-17-status.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout training branch
        uses: actions/checkout@v4
        with:
          ref: train/model-free-core-campaign-2
          fetch-depth: 0
          persist-credentials: true

      - name: Integrate transfer 17 officer
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("main_review/static_status_review.py")
          text = path.read_text(encoding="utf-8")

          replacements = (
              (
                  "from .static_transfer_16_review import run_static_transfer_16_review\n",
                  "from .static_transfer_16_review import run_static_transfer_16_review\n"
                  "from .static_transfer_17_review import run_static_transfer_17_review\n",
              ),
              (
                  "    transfer_16 = run_static_transfer_16_review(root_path, transfer_14_changed)\n",
                  "    transfer_16 = run_static_transfer_16_review(root_path, transfer_14_changed)\n"
                  "    transfer_17 = run_static_transfer_17_review(root_path, transfer_14_changed)\n",
              ),
              (
                  "        transfer_16,\n        selector_continuity,\n",
                  "        transfer_16,\n        transfer_17,\n        selector_continuity,\n",
              ),
              (
                  '        "schema_version": "sergeant.static-status-review.v30",\n',
                  '        "schema_version": "sergeant.static-status-review.v31",\n',
              ),
              (
                  '        "static_transfer_16_review": transfer_16,\n        "static_selector_continuity_review": selector_continuity,\n',
                  '        "static_transfer_16_review": transfer_16,\n'
                  '        "static_transfer_17_review": transfer_17,\n'
                  '        "static_selector_continuity_review": selector_continuity,\n',
              ),
          )

          for old, new in replacements:
              if new in text:
                  continue
              if text.count(old) != 1:
                  raise SystemExit(f"expected one integration marker, found {text.count(old)}: {old!r}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Run focused controls
        run: |
          python -m pip install . pytest
          python -m pytest \
            tests/test_static_transfer_17_payload_review.py \
            tests/test_static_transfer_17_go_review.py \
            tests/test_static_transfer_17_kotlin_review.py -q

      - name: Remove constructor and commit integration
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/patch-transfer-17-status.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main_review/static_status_review.py .github/workflows/patch-transfer-17-status.yml
          git commit -m "Integrate transfer 17 static review"
          git push origin HEAD:train/model-free-core-campaign-2
