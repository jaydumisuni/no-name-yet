name: Final Static Transfer Holdout

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  final-static-transfer-holdout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sergeant
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sergeant
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e .

      - name: Checkout kgateway defective revision
        uses: actions/checkout@v4
        with:
          repository: kgateway-dev/kgateway
          ref: c5a8158e9b1985372e39e4a7395fe4bf1da71329
          path: validation5-cases/kgateway
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            pkg/kgateway/proxy_syncer
            go.mod
            README.md

      - name: Checkout CUDly defective revision
        uses: actions/checkout@v4
        with:
          repository: LeanerCloud/CUDly
          ref: 27fdb06b5787f8e9a528a5c136ef36382603d031
          path: validation5-cases/cudly
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            internal/api
            internal/auth
            internal/server
            go.mod
            README.md

      - name: Checkout Obsidian Vault Pipeline defective revision
        uses: actions/checkout@v4
        with:
          repository: fakechris/obsidian_vault_pipeline
          ref: 2c5fb7316f956ea99d2a849a0e33473b092e2cdc
          path: validation5-cases/obsidian-vault-pipeline
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            src/openclaw_pipeline
            pyproject.toml
            README.md

      - name: Freeze Sergeant-first final holdout reports
        env:
          SERGEANT_LLM_ENABLED: "false"
          SERGEANT_CPL_ENABLED: "false"
          SERGEANT_CPL_POLICY: "disabled"
          SERGEANT_CLOUDFLARE_USAGE_STATE: ${{ runner.temp }}/sergeant-final-holdout-usage.json
        run: |
          mkdir -p build/final-static-transfer-holdout
          python scripts/run_static_training_set.py \
            review-training/unseen-validation-set-5.json \
            --output build/final-static-transfer-holdout/unseen-validation-set-5.json \
            | tee build/final-static-transfer-holdout/unseen-validation-set-5-summary.json

      - name: Publish final holdout summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          path = Path('build/final-static-transfer-holdout/unseen-validation-set-5.json')
          if not path.exists():
              print('## Final static transfer holdout\n\nNo report was produced.')
              raise SystemExit(0)
          data = json.loads(path.read_text(encoding='utf-8'))
          print('## Final static transfer holdout')
          print()
          print('| Case | Verdict | Admitted | Advisory | Assurances | Models |')
          print('|---|---:|---:|---:|---:|---:|')
          for item in data['summaries']:
              print(
                  f"| {item['case_id']} | {item['verdict']} | {item['admitted_finding_count']} | "
                  f"{item['advisory_finding_count']} | {item['unresolved_assurance_count']} | {item['model_calls']} |"
              )
          PY

      - name: Upload immutable final holdout reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-static-transfer-holdout
          path: build/final-static-transfer-holdout/
          if-no-files-found: error
          retention-days: 90
