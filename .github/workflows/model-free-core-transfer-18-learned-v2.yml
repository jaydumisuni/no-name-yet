name: Model-Free Core Transfer 18 Learned Closure v2

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-18-learned-v2.yml"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin corrected Sergeant reviewer
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach d13761c5d24910558420678938117b7c4522ba68
          test "$(git rev-parse HEAD)" = "d13761c5d24910558420678938117b7c4522ba68"
          test -e main_review/static_transfer_18_review.py
          grep -q 'run_static_transfer_18_review' main_review/static_status_review.py
          grep -q 'sergeant.static-status-review.v32' main_review/static_status_review.py

      - name: Checkout exact defective and fixing lineages
        shell: bash
        run: |
          set -euo pipefail
          checkout_pair() {
            local repo="$1" defective="$2" fixing="$3" dest="$4"
            shift 4
            git init "$dest"
            git -C "$dest" remote add origin "https://github.com/${repo}.git"
            git -C "$dest" config core.sparseCheckout true
            : > "$dest/.git/info/sparse-checkout"
            for pattern in "$@"; do printf '%s\n' "$pattern" >> "$dest/.git/info/sparse-checkout"; done
            git -C "$dest" fetch --no-tags --filter=blob:none origin "$fixing"
            git -C "$dest" fetch --no-tags --filter=blob:none origin "$defective"
            git -C "$dest" merge-base --is-ancestor "$defective" "$fixing"
            git -C "$dest" checkout --detach "$defective"
          }

          checkout_pair \
            esphome/device-builder-frontend \
            9a068fb43c4ad33530e718a50c7ee3c1def9670f \
            610f0763924d444f964ed43f02e7d19877913497 \
            transfer-18-v2/esphome \
            '/src/components/firmware-install-dialog.ts' \
            '/src/components/firmware-install-dialog/install-flow.ts' \
            '/src/components/firmware-install-dialog/renderers.ts' \
            '/src/pages/dashboard.ts' \
            '/src/pages/device.ts'

          checkout_pair \
            quanwangniuniu/marketing-simplified \
            f7daeb0f049589e5c4c70253be523446a05fd15a \
            2892dbbfb24b86aa1b6a94f8038955b2faf11831 \
            transfer-18-v2/marketing \
            '/frontend/src/lib/api.ts' \
            '/frontend/src/app/(project)/profile/page.tsx'

          checkout_pair \
            HarperFast/harper \
            0528567226259eb6b59e707338c1e871515f0e1e \
            a2ab425cf066beb6c62a59719d5397ad1cae29d5 \
            transfer-18-v2/harper \
            '/resources/defineResource.ts'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-18-v2-usage.json" >> "$GITHUB_ENV"

      - name: Install reviewer and run controls
        run: |
          python -m pip install . pytest
          python -m pytest \
            tests/test_static_transfer_18_board_review.py \
            tests/test_static_transfer_18_auth_review.py \
            tests/test_static_transfer_18_thenable_review.py -q

      - name: Build learned manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-18-learned-v2
          python - <<'PY'
          import json
          from pathlib import Path

          cases = [
              {
                  "case_id": "transfer-18-v2-a",
                  "repository": "esphome/device-builder-frontend",
                  "source_pr": 1286,
                  "checkout_path": "transfer-18-v2/esphome",
                  "defective_ref": "9a068fb43c4ad33530e718a50c7ee3c1def9670f",
                  "fixing_ref": "610f0763924d444f964ed43f02e7d19877913497",
                  "changed_files": [
                      "src/components/firmware-install-dialog.ts",
                      "src/components/firmware-install-dialog/install-flow.ts",
                      "src/components/firmware-install-dialog/renderers.ts",
                      "src/pages/dashboard.ts",
                      "src/pages/device.ts",
                  ],
                  "workspace_policy": "static_first",
              },
              {
                  "case_id": "transfer-18-v2-b",
                  "repository": "quanwangniuniu/marketing-simplified",
                  "source_pr": 756,
                  "checkout_path": "transfer-18-v2/marketing",
                  "defective_ref": "f7daeb0f049589e5c4c70253be523446a05fd15a",
                  "fixing_ref": "2892dbbfb24b86aa1b6a94f8038955b2faf11831",
                  "changed_files": ["frontend/src/lib/api.ts", "frontend/src/app/(project)/profile/page.tsx"],
                  "workspace_policy": "static_first",
              },
              {
                  "case_id": "transfer-18-v2-c",
                  "repository": "HarperFast/harper",
                  "source_pr": 1825,
                  "checkout_path": "transfer-18-v2/harper",
                  "defective_ref": "0528567226259eb6b59e707338c1e871515f0e1e",
                  "fixing_ref": "a2ab425cf066beb6c62a59719d5397ad1cae29d5",
                  "changed_files": ["resources/defineResource.ts"],
                  "workspace_policy": "static_first",
              },
          ]
          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-18-learned-closure-v2",
              "purpose": "Corrected learned closure after transfer 18 blind 0/3 and the first learned parser miss.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "classification": "learned_closure",
                  "historical_first_pass": "0/3",
                  "historical_first_pass_immutable": True,
                  "reviewer_code": "d13761c5d24910558420678938117b7c4522ba68",
              },
              "cases": cases,
          }
          Path("build/model-free-core-transfer-18-learned-v2/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Run normal pr-review
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-18-learned-v2/runtime-manifest.json \
            --output build/model-free-core-transfer-18-learned-v2/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-18-learned-v2/frozen-summary.json

      - name: Enforce all expected roots
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("build/model-free-core-transfer-18-learned-v2/frozen-result.json").read_text())
          expected = {
              "transfer-18-v2-a": {"install-path-trusts-stale-sidecar-without-yaml-authority-check"},
              "transfer-18-v2-b": {
                  "successful-primary-persistence-skips-required-auth-cookie-sync",
                  "persisted-auth-refresh-field-does-not-match-canonical-token-schema",
              },
              "transfer-18-v2-c": {"thenable-request-body-validated-before-resolution"},
          }
          rows = {item["case"]["case_id"]: item for item in payload["full_results"]}
          for case_id, required in expected.items():
              result = rows[case_id]["result"]
              roots = {str(item.get("root_cause")) for item in result.get("officer_council", {}).get("admitted_findings", [])}
              missing = required - roots
              if missing:
                  raise SystemExit(f"{case_id} missing {sorted(missing)}; got {sorted(roots)}")
              if result.get("verdict") == "APPROVE":
                  raise SystemExit(f"{case_id} remained APPROVE")
          PY

      - name: Upload immutable reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-18-learned-v2
          path: build/model-free-core-transfer-18-learned-v2/
          if-no-files-found: error
          retention-days: 90
