name: Apply Final Workspace Rematch Repair

on:
  push:
    branches:
      - certify-full-cloudflare-council-20260716
    paths:
      - scripts/apply_final_workspace_rematch.py

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out exact branch
        uses: actions/checkout@v4
        with:
          ref: certify-full-cloudflare-council-20260716
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply exact product repair
        run: python scripts/apply_final_workspace_rematch.py

      - name: Install Sergeant and test tools
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e .

      - name: Run focused rematch proof
        run: >-
          python -m pytest -q
          tests/test_workspace_ready_campaign.py
          tests/test_coderabbit_rematch_regressions.py
          tests/test_offline_officer_council.py
          tests/test_pr_reviewer.py

      - name: Run full suite
        run: python -m pytest -q

      - name: Validate exact patch
        run: git diff --check

      - name: Publish product-only repaired head
        run: |
          git config user.name "Sergeant Constructor"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Close final workspace rematch gaps [workspace-rematch-final]"
          git push origin HEAD:certify-full-cloudflare-council-20260716
