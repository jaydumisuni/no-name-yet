name: Proof Hunter Full Standard

on:
  push:
    branches:
      - proof/hunter-mobile-header-20260721
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: proof-hunter-full-standard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prove:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout Sergeant proof branch
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Chrome is available
        run: |
          test -x /usr/bin/google-chrome
          /usr/bin/google-chrome --version

      - name: Prepare dual-drawer full standard scanner
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('tools/proof_hunter_full_standard_v2.mjs')
          s = p.read_text()
          old = "drawer:!!s?.classList.contains('open'),scrim:"
          new = "drawer:!!s?.classList.contains('open')||!!document.querySelector('#hcs2Side')?.classList.contains('open'),scrim:"
          if old not in s:
              raise SystemExit('shell drawer marker missing')
          s = s.replace(old, new, 1)
          start = s.index('async function openDrawer(p) {')
          end = s.index('\nasync function roles()', start)
          replacement = r'''async function openDrawer(p) {
            const selector = await visibleMenuSelector();
            if (!selector) throw new Error(`${p.name}: no visible mobile menu control`);
            await activate(selector, p, 300);
            await waitFor("document.querySelector('#sidebar')?.classList.contains('open')||document.querySelector('#hcs2Side')?.classList.contains('open')", `${p.name} drawer open`, 100, 70);
            const st = await shell();
            const chat = await evalJs("document.querySelector('#hcs2Side')?.classList.contains('open')||false");
            if (!chat && !st.scrim) throw new Error(`${p.name}: Employee OS drawer opened without scrim through ${selector}`);
            return selector;
          }
          async function closeDrawer(p) {
            const chat = await evalJs("document.querySelector('#hcs2Side')?.classList.contains('open')||false");
            if (chat) await activate('#hcs2Menu', p, 240);
            else {
              const closeVisible = await evalJs(`(()=>{const e=document.querySelector('#hunterMobileSidebarClose');if(!e)return false;const r=e.getBoundingClientRect(),s=getComputedStyle(e);return s.display!=='none'&&r.width>=24&&r.height>=24})()`);
              await activate(closeVisible ? '#hunterMobileSidebarClose' : '#drawerScrim', p, 220);
            }
            await waitFor("!document.querySelector('#sidebar')?.classList.contains('open')&&!document.querySelector('#drawerScrim')?.classList.contains('open')&&!document.querySelector('#hcs2Side')?.classList.contains('open')", `${p.name} drawer close`, 100, 70);
          }
          '''
          s = s[:start] + replacement + s[end:]
          p.write_text(s)
          PY

      - name: Prove zero Hunter runtime exceptions
        env:
          CHROME_PATH: /usr/bin/google-chrome
          HUNTER_REVIEW_URL: https://c6388088-hunter-ui-review.thetechguy712.workers.dev/portal
          PROOF_DIR: artifacts/hunter-runtime-source
        run: node tools/diagnose_hunter_runtime_source.mjs

      - name: Trace regular Hunter chat menu real touch
        env:
          CHROME_PATH: /usr/bin/google-chrome
          HUNTER_REVIEW_URL: https://c6388088-hunter-ui-review.thetechguy712.workers.dev/portal
          PROOF_DIR: artifacts/hunter-chat-menu-touch
        run: node tools/diagnose_hunter_chat_menu_touch.mjs

      - name: Prove full mobile and desktop interface standard
        env:
          CHROME_PATH: /usr/bin/google-chrome
          HUNTER_REVIEW_URL: https://c6388088-hunter-ui-review.thetechguy712.workers.dev/portal
          PROOF_DIR: artifacts/hunter-full-standard
        run: node tools/proof_hunter_full_standard_v2.mjs

      - name: Upload full standard evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hunter-full-standard-proof
          path: artifacts
          if-no-files-found: error
          retention-days: 14
